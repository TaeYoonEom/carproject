<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 - 1단계</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
    }
    .encar-title {
      text-align: center;
      color: red;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .step-indicator {
      text-align: center;
      color: #333;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .user-type {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      cursor: pointer;
    }
    .user-type:hover {
      background: #f9f9f9;
    }
    .user-type h3 {
      margin: 0;
      font-size: 16px;
    }
    .user-type p {
      font-size: 14px;
      color: #666;
    }
  </style>
  <script>
    function goToStep2(type) {
      // 실제 구현에서는 URL 파라미터 또는 세션으로 type 전달 가능
      window.location.href = '/register/step2.html';
    }
  </script>
</head>
<body>
<div class="container">
  <div class="encar-title">Encar 회원가입</div>
  <div class="step-indicator">1. 회원선택 → 2. 약관동의 → 3. 정보입력 → 4. 완료</div>

  <h3>회원유형선택</h3>
  <p>신규 회원은 SNS 계정 사용을 위해 간편가입 절차를 진행합니다.</p>

  <div class="user-type" onclick="goToStep2('personal')">
    <h3>개인회원</h3>
    <p>차량을 구매, 판매하려는 만 14세 이상의 개인회원으로 1년에 4회까지 판매차량 등록이 가능합니다.</p>
  </div>

  <div class="user-type" onclick="goToStep2('repeat')">
    <h3>반복회원</h3>
    <p>매매회원이 아닌 개인 혹은 법인으로 1년에 5회 이상 반복적으로 판매차량 등록이 가능합니다.</p>
  </div>

  <div class="user-type" onclick="goToStep2('dealer')">
    <h3>매매회원</h3>
    <p>차량을 전문적으로 매매하는 상사의 딜러회원으로 판매차량 등록에 제한이 없습니다.</p>
  </div>
</div>
</body>
</html>
