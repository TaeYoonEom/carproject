<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>회원가입 완료</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .container {
          max-width: 500px;
          margin: 60px auto;
          padding: 40px;
          background: #fff;
          text-align: center;
        }
        .encar-title {
          font-size: 28px;
          color: red;
          font-weight: bold;
          margin-bottom: 10px;
        }
        .message {
          font-size: 18px;
          margin: 20px 0 30px;
        }
        .login-button {
          padding: 12px 30px;
          font-size: 16px;
          background-color: red;
          color: #fff;
          border: none;
          border-radius: 5px;
          text-decoration: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="encar-title">Encar</div>
    <p class="message">회원가입이 완료되었습니다.<br>지금 바로 로그인해보세요!</p>
    <a href="/login" class="login-button">로그인하기</a>
</div>
</body>
</html>
