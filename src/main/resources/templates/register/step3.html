<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>회원가입 - 3단계</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .container {
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
      background: #fff;
    }
    .encar-title {
      text-align: center;
      color: red;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .step-indicator {
      text-align: center;
      color: #333;
      font-size: 14px;
      margin-bottom: 20px;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
      max-width: 400px;
      margin: 0 auto;
    }
    label {
      font-weight: bold;
    }
    input, select {
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 100%;
      box-sizing: border-box;
    }
    .gender-group, .verify-group {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .verify-group input {
      flex: 1;
    }
    .submit-button, .check-button, .verify-button {
      padding: 8px 12px;
      font-size: 14px;
      background-color: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      white-space: nowrap;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="encar-title">Encar 회원가입</div>
  <div class="step-indicator">1. 회원선택 → 2. 약관동의 → <b>3. 정보입력</b> → 4. 완료</div>

  <form method="post" action="/register/step3">
  <div>
      <label>이름</label>
      <input type="text" name="name" required>
    </div>

    <div>
      <label>생년월일</label>
      <input type="date" name="birth" required>
    </div>


    <div>
      <label>아이디</label>
      <div class="verify-group">
        <input type="text" name="username" required>
        <button type="button" class="check-button">중복 확인</button>
      </div>
    </div>

    <div>
      <label>비밀번호</label>
      <input type="password" name="password" minlength="8" required>
    </div>

    <div>
      <label>비밀번호 확인</label>
      <input type="password" name="confirm_password" minlength="8" required>
    </div>

    <div>
      <label>휴대전화번호</label>
      <div class="verify-group">
        <input type="tel" name="phone" placeholder="010-1234-5678" required>
        <button type="button" class="verify-button">인증요청</button>
      </div>
    </div>

    <div>
      <label>인증번호</label>
      <input type="text" name="verify_code">
    </div>

    <div>
      <label>이메일</label>
      <input type="email" name="email">
    </div>

    <div>
      <label>거주지</label>
      <div class="verify-group">
        <select name="region1" required>
          <option>시도 선택</option>
          <option>서울</option>
          <option>경기</option>
          <option>부산</option>
        </select>
        <select name="region2" required>
          <option>시군구 선택</option>
        </select>
      </div>
    </div>

    <button type="submit" class="submit-button">회원가입 완료</button>
  </form>
</div>
</body>
</html>

<script>
  document.querySelector(".check-button").addEventListener("click", function () {
      const username = document.querySelector("input[name='username']").value;

      if (!username) {
          alert("아이디를 입력해주세요.");
          return;
      }

      fetch(`/register/check-username?username=${encodeURIComponent(username)}`)
          .then(response => response.json())
          .then(isDuplicate => {
              if (isDuplicate) {
                  alert("이미 사용 중인 아이디입니다.");
                  document.querySelector("input[name='username']").style.border = "2px solid red";
              } else {
                  alert("사용 가능한 아이디입니다.");
                  document.querySelector("input[name='username']").style.border = "2px solid green";
              }
          })
          .catch(error => {
              console.error("중복 확인 실패:", error);
              alert("서버 오류가 발생했습니다.");
          });
  });
</script>
