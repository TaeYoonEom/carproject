<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원정보 수정</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #fff;
      color: #222;
    }
    .container {
      width: 500px;
      margin: 40px auto;
    }
    h2, h3 {
      font-size: 18px;
      margin: 30px 0 15px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px;
      margin: 5px 0 15px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .birth-wrapper {
      display: flex;
      gap: 10px;
    }
    .birth-wrapper input,
    .birth-wrapper select {
      flex: 1;
    }
    .button-group {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .btn {
      padding: 8px 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
      color: #222;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-red {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      background-color: #d32f2f;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    .phone-verify {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .address-wrapper {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>기본정보입력</h2>

  <form method="post" th:action="@{/mypage/info/update}" onsubmit="return checkVerification()">
    <!-- 이름 -->
    <label>이름</label>
    <input type="text" name="name" th:value="${member.name}" readonly>

    <!-- 이메일 -->
    <label>이메일</label>
    <input type="email" name="email" th:value="${member.email}" readonly>

    <!-- 생년월일 -->
    <label>생년월일</label>
    <div class="birth-wrapper">
      <input type="text" name="birthYear" placeholder="2001">
      <input type="text" name="birthMonth" placeholder="9">
      <input type="text" name="birthDay" placeholder="7">
      <select name="gender">
        <option>남</option>
        <option>여</option>
      </select>
    </div>

    <!-- ✅ 휴대폰 인증 -->
    <label>휴대전화번호</label>
    <div class="phone-verify">
      <input type="text" name="phone" th:value="${member.phone}" placeholder="휴대폰 번호 입력">
      <button type="button" class="btn" onclick="sendAuthCode()">인증번호 요청</button>
    </div>

    <div class="phone-verify">
      <input type="text" name="phoneCode" placeholder="인증번호 입력">
      <button type="button" class="btn" onclick="verifyCode()">인증번호 확인</button>
    </div>

    <!-- ✅ 주소 입력 -->
    <label>주소</label>
    <div class="address-wrapper">
      <input type="text" name="zipcode" placeholder="우편번호">
      <button type="button" class="btn" onclick="openDaumPostcode()">우편번호찾기</button>
    </div>
    <input type="text" name="address" placeholder="예: 경기도 광명시 철산동" th:value="${member.address}">

    <!-- 비밀번호 변경 -->
    <h3>비밀번호 설정 및 변경</h3>
    <input type="password" name="newPassword" placeholder="새 비밀번호">
    <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인">
    <p style="font-size: 12px; color: gray;">
      영문 대/소문자, 숫자, 특수문자 중 2종류 이상 조합하여 10~16자 입력
    </p>

    <!-- 소셜 로그인 연결 -->
    <h3>로그인 계정 연결</h3>
    <ul class="social-login">
      <li>네이버 <button type="button">연결하기</button></li>
      <li>카카오 <button type="button">연결하기</button></li>
      <li>구글 <button type="button">연결하기</button></li>
      <li>애플 <button type="button">연결하기</button></li>
    </ul>

    <!-- 회원 전환 -->
    <h3>회원 전환</h3>
    <button type="button" class="btn">매매회원으로 전환</button>
    <button type="button" class="btn">반복회원으로 전환</button>

    <!-- 마케팅 동의 -->
    <h3>마케팅 알림 설정</h3>
    <label><input type="checkbox" name="agreeMarketing" checked> 마케팅 목적 개인정보 수집 및 이용</label><br>
    <label><input type="checkbox" name="agreeAdEmail" checked> 이메일</label><br>
    <label><input type="checkbox" name="agreeAdSms" checked> SMS</label><br>
    <label><input type="checkbox" name="agreeAdPush"> 푸시</label>

    <!-- 버튼 -->
    <div class="button-group">
      <a href="/mypage" class="btn">취소</a>
      <button type="submit" class="btn-red">수정</button>
    </div>
  </form>
</div>

<!-- ✅ 다음 주소 API -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
  // ✅ 인증은 형식만
  let isVerified = false;

  // ✅ 주소검색 (시/구/동까지만 자동 추출)
  function openDaumPostcode() {
    new daum.Postcode({
      oncomplete: function(data) {
        document.querySelector("input[name='zipcode']").value = data.zonecode;

        let addr = data.address; // 전체 주소
        if (data.addressType === 'R' && data.bname) {
          // 도로명 주소일 경우 법정동명 포함
          addr = `${data.sido} ${data.sigungu} ${data.bname}`;
        } else {
          // 지번 주소일 경우 시/구/동까지만
          const parts = addr.split(" ");
          if (parts.length > 3) addr = parts.slice(0, 3).join(" ");
        }
        document.querySelector("input[name='address']").value = addr;
      }
    }).open();
  }

  // ✅ 인증번호 요청 (테스트용)
  function sendAuthCode() {
    const phone = document.querySelector("input[name='phone']").value.trim();
    if (!phone) return alert("📱 휴대폰 번호를 입력해주세요.");
    alert("📨 인증번호가 발송되었습니다! (테스트용)");
    isVerified = false;
  }

  // ✅ 인증번호 확인 (아무 숫자 입력하면 성공)
  function verifyCode() {
    const code = document.querySelector("input[name='phoneCode']").value.trim();
    if (code) {
      isVerified = true;
      alert("✅ 인증이 완료되었습니다!");
    } else {
      alert("❌ 인증번호를 입력해주세요.");
    }
  }

  // ✅ 폼 제출 시 (형식상 인증 확인)
  function checkVerification() {
    if (!isVerified) {
      alert("⚠️ 인증번호 확인 버튼을 눌러주세요.");
      return false;
    }
    return true;
  }
</script>
</body>
</html>
