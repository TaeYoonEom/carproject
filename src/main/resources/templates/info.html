<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>회원정보 수정</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body {
      font-family: 'Pretendard', sans-serif;
      background-color: #fff;
      color: #222;
    }
    .container {
      width: 500px;
      margin: 40px auto;
    }
    h2, h3 {
      font-size: 18px;
      margin: 30px 0 15px;
    }
    input[type="text"],
    input[type="email"],
    input[type="password"],
    select {
      width: 100%;
      padding: 12px;
      margin: 5px 0 15px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .birth-wrapper {
      display: flex;
      gap: 10px;
    }
    .birth-wrapper input,
    .birth-wrapper select {
      flex: 1;
    }
    .button-group {
      margin-top: 30px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .btn {
      padding: 8px 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background-color: #f9f9f9;
      color: #222;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-red {
      padding: 8px 20px;
      border: none;
      border-radius: 8px;
      background-color: #d32f2f;
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .social-login li {
      margin-bottom: 10px;
    }
    .social-login button {
      float: right;
      background: #f1f1f1;
      border: 1px solid #ccc;
      border-radius: 15px;
      padding: 5px 12px;
      font-size: 13px;
    }
    label input[type="checkbox"] {
      margin-right: 6px;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>기본정보입력</h2>
  <form method="post" th:action="@{/mypage/info/update}">

    <label>이름</label>
    <input type="text" name="name" th:value="${member.name}" readonly>

    <label>이메일</label>
    <input type="email" name="email" th:value="${member.email}" readonly>

    <label>생년월일</label>
    <div class="birth-wrapper">
      <input type="text" name="birthYear" placeholder="2001">
      <input type="text" name="birthMonth" placeholder="9">
      <input type="text" name="birthDay" placeholder="7">
      <select name="gender">
        <option>남</option>
        <option>여</option>
      </select>
    </div>

    <label>휴대전화번호</label>
    <input type="text" name="phone" th:value="${member.phone}">
    <button type="button" class="btn">인증번호 요청</button>

    <input type="text" name="phoneCode" placeholder="인증번호 입력">

    <label>전화번호</label>
    <input type="text" name="tel" placeholder="'-' 제외하고 숫자만 입력">
    <p style="font-size: 12px; color: gray;">
      평생번호(0502~0506), 대표번호(1599, 1666 등)는 사용이 제한될 수 있습니다.
    </p>

    <label>주소</label>
    <div style="display: flex; gap: 10px;">
      <input type="text" name="zipcode" placeholder="우편번호">
      <button type="button" class="btn">우편번호찾기</button>
    </div>
    <input type="text" name="address" placeholder="예: 경기 광명시" th:value="${member.address}">

    <h3>비밀번호 설정 및 변경</h3>
    <input type="password" name="newPassword" placeholder="새 비밀번호">
    <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인">
    <p style="font-size: 12px; color: gray;">
      영문 대/소문자, 숫자, 특수문자 중 2종류 이상 조합하여 10~16자 입력
    </p>

    <h3>로그인 계정 연결</h3>
    <ul class="social-login">
      <li>네이버 <button type="button">연결하기</button></li>
      <li>카카오 <button type="button">연결하기</button></li>
      <li>구글 <button type="button">연결하기</button></li>
      <li>애플 <button type="button">연결하기</button></li>
    </ul>

    <h3>회원 전환</h3>
    <button type="button" class="btn">매매회원으로 전환</button>
    <button type="button" class="btn">반복회원으로 전환</button>

    <h3>마케팅 알림 설정</h3>
    <label><input type="checkbox" name="agreeMarketing" checked> 마케팅 목적 개인정보 수집 및 이용</label><br>
    <label><input type="checkbox" name="agreeAdEmail" checked> 이메일</label><br>
    <label><input type="checkbox" name="agreeAdSms" checked> SMS</label><br>
    <label><input type="checkbox" name="agreeAdPush"> 푸시</label>

    <div class="button-group">
      <a href="/mypage" class="btn">취소</a>
      <button type="submit" class="btn-red">수정</button>
    </div>

  </form>
</div>
</body>
</html>
