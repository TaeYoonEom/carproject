<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <title>차량 정보 입력</title>
  <th:block layout:fragment="style">
    <link rel="stylesheet" th:href="@{/css/sell_input.css}">
  </th:block>
</head>
<body>

  <div class="input-container">
    <h2>
      <img src="/img/car_input_icon.svg" class="input-icon" alt="차량" />
      차량 정보 입력
    </h2>
    <div class="input-desc">
      정확한 차량 정보를 입력해주세요.<br>
      <span class="desc-tip">차량번호와 소유자명은 수정할 수 없습니다.</span>
    </div>
    <form th:action="@{/sell/detail/input/save}" method="post" onsubmit="return validateForm()">
      <!-- 차량 번호 (수정 불가) -->
      <div class="form-group">
        <label>차량 번호</label>
        <input type="text" name="carNumber" th:value="${draft.carNumber}" readonly>
      </div>
      <!-- 소유자명 (수정 불가) -->
      <div class="form-group">
        <label>소유자명</label>
        <input type="text" name="ownerName" th:value="${draft.ownerName}" readonly>
      </div>

      <!-- 제조국(국산/수입) -->
      <div class="form-group">
        <label>제조국</label>
        <div class="origin-row">
          <label class="origin-radio">
            <input type="radio" name="origin" value="0"
                   th:checked="${draft.origin == null or !draft.origin}"
                   id="originDomestic"> 국산
          </label>
          <label class="origin-radio">
            <input type="radio" name="origin" value="1"
                   th:checked="${draft.origin == true}"
                   id="originImport"> 수입
          </label>
        </div>
      </div>

      <!-- 제조사 -->
      <div class="form-group">
        <label>제조사</label>
        <select id="manufacturerSelect" class="w-full">
          <option value="">제조사를 선택하세요</option>
          <!-- JS에서 옵션을 채움 -->
          <option value="__OTHER__">기타(직접 입력)</option>
        </select>

        <!-- 기타 입력창 (기타 선택 시 표시) -->
        <input type="text" id="manufacturerOther" class="mt-8"
               placeholder="직접 입력" style="display:none;">
        <!-- 서버로 실제 전송될 값 -->
        <input type="hidden" name="manufacturer" id="manufacturer">
      </div>

      <!-- 모델 -->
      <div class="form-group">
        <label>모델</label>
        <select id="modelSelect" class="w-full" disabled>
          <option value="">모델을 선택하세요</option>
          <!-- JS에서 옵션을 채움 -->
          <option value="__OTHER__">기타(직접 입력)</option>
        </select>

        <!-- 기타 입력창 (기타 선택 시 표시) -->
        <input type="text" id="modelOther" class="mt-8"
               placeholder="직접 입력" style="display:none;">
        <!-- 서버로 실제 전송될 값 -->
        <input type="hidden" name="model" id="model">
      </div>


      <!-- 모델명 -->
      <div class="form-group">
        <label>모델명</label>
        <input type="text" name="modelName" th:value="${draft.modelName}" placeholder="예: 현대 그랜저 IG 2.4 프리미엄" required>
      </div>
      <!-- 연식 (월 선택) -->
      <div class="form-group">
        <label>연식 <span class="small-label">(YYYY-MM)</span></label>
        <input type="month" name="manufactureDate" required>
      </div>
      <!-- 주행거리 -->
      <div class="form-group">
        <label>주행거리 (km)</label>
        <input type="number" name="mileage" th:value="${draft.mileage}" min="0" placeholder="예: 85400" required>
      </div>
      <!-- 거래 지역 -->
      <div class="form-group">
        <label>거래 지역</label>
        <div class="region-row">
          <select id="province" required>
            <option value="">시/도 선택</option>
            <option value="서울특별시">서울특별시</option>
            <option value="경기도">경기도</option>
            <option value="부산광역시">부산광역시</option>
            <option value="강원도">강원도</option>
            <!-- 필요시 추가 -->
          </select>
          <select id="city" required disabled>
            <option value="">시/군/구 선택</option>
          </select>
        </div>
        <!-- 실제 전송될 지역 값 -->
        <input type="hidden" name="region" id="regionInput" />
      </div>
      <div class="form-actions">
        <button type="submit" class="save-btn">정보 저장하고 다음</button>
      </div>
    </form>
  </div>

<th:block layout:fragment="script">
  <script>
    function validateForm() {
        const modelName = document.querySelector("input[name='modelName']").value.trim();
        const date = document.querySelector("input[name='manufactureDate']").value;
        const mileage = document.querySelector("input[name='mileage']").value;
        const region = document.getElementById("regionInput").value;
        if (!modelName || !date || !mileage || !region) {
            alert("모든 필수 정보를 입력해주세요.");
            return false;
        }
        return true;
    }
  </script>
  <script>
    const provinceCityMap = {
      "서울특별시": ["강남구", "서초구", "강북구", "송파구", "관악구"],
      "경기도": ["부천시", "광명시", "안양시", "성남시", "광명시"],
      "부산광역시": ["해운대구", "사하구", "남구", "중구"],
      "강원도": ["춘천시", "원주시", "강릉시"]
    };

    const provinceSelect = document.getElementById("province");
    const citySelect = document.getElementById("city");
    const regionInput = document.getElementById("regionInput");

    provinceSelect.addEventListener("change", function () {
      const selectedProvince = this.value;
      citySelect.innerHTML = `<option value="">시/군/구 선택</option>`;

      if (selectedProvince && provinceCityMap[selectedProvince]) {
        provinceCityMap[selectedProvince].forEach(city => {
          const option = document.createElement("option");
          option.value = city;
          option.textContent = city;
          citySelect.appendChild(option);
        });
        citySelect.disabled = false;
      } else {
        citySelect.disabled = true;
      }
      regionInput.value = "";
    });

    citySelect.addEventListener("change", function () {
      const province = provinceSelect.value;
      const city = this.value;
      if (province && city) {
        regionInput.value = `${province} ${city}`;
      }
    });
  </script>
  <script>
    // 카탈로그(대표 모델만 예시)
    const CATALOG = {
      domestic: {
        "현대":     ["아반떼","쏘나타","그랜저","투싼","싼타페"],
        "기아":     ["모닝","K3","K5","K8","스포티지","쏘렌토","카니발"],
        "르노코리아": ["SM3","SM5","QM6"],
        "KG 모빌리티": ["티볼리","코란도","렉스턴"],
        "쉐보레":   ["스파크","말리부","트랙스","트레일블레이저"],
        "제네시스": ["G70","G80","G90","GV70","GV80"]
      },
      import: {
        "BMW":            ["3 Series","5 Series","X3","X5"],
        "Mercedes-Benz":  ["C-Class","E-Class","S-Class","GLC"],
        "Audi":           ["A4","A6","Q5","Q7"],
        "Volkswagen":     ["Golf","Tiguan","Passat"],
        "Toyota":         ["Camry","RAV4","Prius"],
        "Lexus":          ["ES","RX"],
        "Honda":          ["Accord","CR-V"],
        "Volvo":          ["S60","S90","XC60"],
        "Porshe":         ["911","Cayenne","Macan", "Panamera"]
      }
    };

    // DOM 참조
    const originDomestic = document.getElementById('originDomestic');
    const originImport   = document.getElementById('originImport');

    const manufacturerSelect = document.getElementById('manufacturerSelect');
    const manufacturerOther  = document.getElementById('manufacturerOther');
    const manufacturerHidden = document.getElementById('manufacturer');

    const modelSelect = document.getElementById('modelSelect');
    const modelOther  = document.getElementById('modelOther');
    const modelHidden = document.getElementById('model');

    // 서버에서 내려온 기존 값(있으면 미리 반영)
    const presetManufacturer = /*[[${draft.manufacturer}]]*/ '';
    const presetModel        = /*[[${draft.model}]]*/ '';
    const presetOrigin       = /*[[${draft.origin}]]*/ '';

    // 제조사 옵션 채우기
    function fillManufacturers() {
      const isDomestic = originDomestic.checked || (!originDomestic.checked && !originImport.checked);
      const source = isDomestic ? CATALOG.domestic : CATALOG.import;

      // 초기화
      manufacturerSelect.innerHTML =
        '<option value="">제조사를 선택하세요</option>' +
        Object.keys(source).map(m => `<option value="${m}">${m}</option>`).join('') +
        '<option value="__OTHER__">기타(직접 입력)</option>';

      manufacturerOther.style.display = 'none';
      manufacturerOther.value = '';

      // 모델도 초기화
      modelSelect.innerHTML = '<option value="">모델을 선택하세요</option><option value="__OTHER__">기타(직접 입력)</option>';
      modelSelect.disabled = true;
      modelOther.style.display = 'none';
      modelOther.value = '';

      // hidden 초기화
      manufacturerHidden.value = '';
      modelHidden.value = '';
    }

    // 모델 옵션 채우기
    function fillModels(maker) {
      const isDomestic = originDomestic.checked;
      const source = isDomestic ? CATALOG.domestic : CATALOG.import;
      const models = source[maker] || [];

      modelSelect.innerHTML =
        '<option value="">모델을 선택하세요</option>' +
        models.map(v => `<option value="${v}">${v}</option>`).join('') +
        '<option value="__OTHER__">기타(직접 입력)</option>';

      modelSelect.disabled = false;
      modelOther.style.display = 'none';
      modelOther.value = '';
      modelHidden.value = '';
    }

    // 이벤트 바인딩
    originDomestic.addEventListener('change', fillManufacturers);
    originImport.addEventListener('change',  fillManufacturers);

    manufacturerSelect.addEventListener('change', () => {
      const v = manufacturerSelect.value;
      if (v === '__OTHER__') {
        manufacturerOther.style.display = '';
        manufacturerHidden.value = ''; // 직접 입력 기다림
        modelSelect.innerHTML = '<option value="">모델을 선택하세요</option><option value="__OTHER__">기타(직접 입력)</option>';
        modelSelect.disabled = false;  // 기타 제조사여도 모델 기타 가능
        modelOther.style.display = 'none';
        modelOther.value = '';
        modelHidden.value = '';
      } else if (v) {
        manufacturerOther.style.display = 'none';
        manufacturerOther.value = '';
        manufacturerHidden.value = v;
        fillModels(v);
      } else {
        manufacturerOther.style.display = 'none';
        manufacturerOther.value = '';
        manufacturerHidden.value = '';
        modelSelect.innerHTML = '<option value="">모델을 선택하세요</option><option value="__OTHER__">기타(직접 입력)</option>';
        modelSelect.disabled = true;
        modelOther.style.display = 'none';
        modelOther.value = '';
        modelHidden.value = '';
      }
    });

    modelSelect.addEventListener('change', () => {
      const v = modelSelect.value;
      if (v === '__OTHER__') {
        modelOther.style.display = '';
        modelHidden.value = '';
      } else if (v) {
        modelOther.style.display = 'none';
        modelOther.value = '';
        modelHidden.value = v;
      } else {
        modelOther.style.display = 'none';
        modelOther.value = '';
        modelHidden.value = '';
      }
    });

    // 폼 제출 시 유효성 + 기타 처리
    const _oldValidate = validateForm;
    window.validateForm = function () {
      // 기존 필수값 체크
      if (_oldValidate && _oldValidate() === false) return false;

      // manufacturer
      if (manufacturerSelect.value === '__OTHER__') {
        if (!manufacturerOther.value.trim()) {
          alert('제조사를 입력하세요.');
          manufacturerOther.focus();
          return false;
        }
        manufacturerHidden.value = manufacturerOther.value.trim();
      }
      if (!manufacturerHidden.value) {
        alert('제조사를 선택하세요.');
        manufacturerSelect.focus();
        return false;
      }

      // model
      if (modelSelect.value === '__OTHER__') {
        if (!modelOther.value.trim()) {
          alert('모델을 입력하세요.');
          modelOther.focus();
          return false;
        }
        modelHidden.value = modelOther.value.trim();
      }
      if (!modelHidden.value) {
        alert('모델을 선택하세요.');
        modelSelect.focus();
        return false;
      }

      return true;
    };

    // 처음 로드 시: 라디오 상태 보고 제조사/모델 채우기 + 기존 값 복원
    fillManufacturers();

    // preset 값이 있으면 복원
    (function restorePreset() {
      // origin은 Thymeleaf 체크로 반영됨. 제조사/모델만 맞춰줌
      const isDomestic = originDomestic.checked;
      const hasMaker = presetManufacturer && presetManufacturer.length > 0;

      if (hasMaker) {
        // 현재 카탈로그에 있으면 select로, 없으면 기타로
        const source = isDomestic ? CATALOG.domestic : CATALOG.import;
        if (source[presetManufacturer]) {
          manufacturerSelect.value = presetManufacturer;
          manufacturerHidden.value = presetManufacturer;
          fillModels(presetManufacturer);

          if (presetModel && (source[presetManufacturer] || []).includes(presetModel)) {
            modelSelect.value = presetModel;
            modelHidden.value = presetModel;
          } else if (presetModel) {
            modelSelect.value = '__OTHER__';
            modelOther.style.display = '';
            modelOther.value = presetModel;
            modelHidden.value = presetModel;
          }
        } else {
          manufacturerSelect.value = '__OTHER__';
          manufacturerOther.style.display = '';
          manufacturerOther.value = presetManufacturer;
          manufacturerHidden.value = presetManufacturer;

          modelSelect.disabled = false;
          modelSelect.value = '__OTHER__';
          modelOther.style.display = '';
          modelOther.value = presetModel || '';
          modelHidden.value = presetModel || '';
        }
      }
    })();
  </script>

</th:block>
</body>
</html>
