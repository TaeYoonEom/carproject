<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>차량 상세 정보</title>
  <link rel="stylesheet" th:href="@{/css/car_detail.css}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="detail-container">
  <div class="detail-title">
    <img src="/img/car-detail-icon.svg" alt="" class="car-detail-icon">
    차량 상세 정보
  </div>
  <ul class="detail-list">
    <li><span class="item-label">차량 번호</span> <span th:text="${car.carNumber}"></span></li>
    <li><span class="item-label">소유자명</span> <span th:text="${car.ownerName}"></span></li>
    <li><span class="item-label">모델명</span> <span th:text="${car.modelName}"></span></li>
    <li><span class="item-label">연식</span> <span th:text="${#temporals.format(car.manufactureDate, 'yyyy-MM')}"></span></li>
    <li><span class="item-label">주행거리</span> <span th:text="${car.mileage} + ' km'"></span></li>
    <li><span class="item-label">거래 지역</span> <span th:text="${car.region}"></span></li>
  </ul>

  <!-- 시세 안내 박스 -->
  <div class="estimate-box">
    <div class="estimate-label">이 차의 시세는</div>
    <div class="model-info" th:text="${car.modelName}"></div>
    <div class="estimate-main">
      <span th:text="${minPrice}"></span> ~ <span th:text="${maxPrice}"></span> <span class="price-unit">만원</span>
    </div>
    <div class="estimate-bar-wrap">
      <div class="estimate-bar"
           th:style="'width:' + (${estimatedPrice} - ${minPrice}) * 100 / (${maxPrice} - ${minPrice}) + '%;'">
      </div>
    </div>
    <div class="estimate-guide">입력된 연식과 주행거리 기준</div>
  </div>

  <!-- 사진 등록 이동 버튼 -->
  <a class="next-btn"
     th:href="@{|/sell/detail/photo?carId=${car.id}|}">
    <img src="/img/camera.svg" alt="" class="btn-icon">
    내 차 사진 등록하기
  </a>
</div>
</body>
</html>
