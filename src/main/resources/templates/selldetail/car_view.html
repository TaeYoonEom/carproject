<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8">
  <title>차량 상세 정보</title>
  <link rel="stylesheet" th:href="@{/css/car_detail.css}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #fafafa;
      margin: 0;
      padding: 0;
    }
    .detail-container {
      max-width: 500px;
      margin: 50px auto;
      padding: 30px;
      background-color: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .detail-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 25px;
      color: #d62828;
      text-align: center;
    }
    .detail-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .detail-list li {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 16px;
    }
    .detail-list strong {
      color: #333;
    }
    .go-back {
      display: block;
      margin-top: 30px;
      text-align: center;
      background-color: #d62828;
      color: white;
      padding: 12px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }
    .go-back:hover {
      background-color: #b71f1f;
    }
  </style>
</head>
<body>
<div class="detail-container">
  <div class="detail-title">차량 상세 정보</div>
  <ul class="detail-list">
    <li><strong>차량 번호</strong> <span th:text="${car.carNumber}"></span></li>
    <li><strong>소유자명</strong> <span th:text="${car.ownerName}"></span></li>
    <li><strong>모델명</strong> <span th:text="${car.modelName}"></span></li>
    <li><strong>연식</strong> <span th:text="${#temporals.format(car.manufactureDate, 'yyyy-MM')}"></span></li>
    <li><strong>주행거리</strong> <span th:text="${car.mileage} + ' km'"></span></li>
    <li><strong>거래 지역</strong> <span th:text="${car.region}"></span></li>
  </ul>
  <a href="/sell" class="go-back">← 판매 홈으로 돌아가기</a>
</div>
</body>
</html>
