<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>차량 사진 등록</title>
    <link rel="stylesheet" th:href="@{/css/sell_car_photo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="photo-container">
    <div class="photo-title">차량사진 6장 등록해주세요</div>
    <div class="photo-desc">사진에 얼굴, 개인정보가 포함되지 않도록 유의하세요</div>
    <div class="photo-tip">
        <b>차량 사진 TIP</b><br>
        전면, 좌측, 우측, 후면, 운전석, 뒷자석 필수 등록
    </div>
    <form th:action="@{/sell/detail/photo/upload}" method="post" enctype="multipart/form-data" onsubmit="return validatePhotoCount()">
        <input type="hidden" name="carId" th:value="${car.id}" />
        <div class="photo-list-preview">
            <label class="photo-upload-box">
                <input type="file" name="front" accept="image/*" required onchange="previewImg(this, 'front_preview')">
                <img th:src="@{${car.frontViewUrl}}" id="front_preview" class="upload-img" alt="전면" src="/img/car-front.png">
                <div class="upload-label">전면</div>
            </label>
            <label class="photo-upload-box">
                <input type="file" name="left" accept="image/*" required onchange="previewImg(this, 'left_preview')">
                <img th:src="@{${car.leftSideUrl}}" id="left_preview" class="upload-img" alt="좌측" src="/img/car-left.png">
                <div class="upload-label">좌측</div>
            </label>
            <label class="photo-upload-box">
                <input type="file" name="right" accept="image/*" required onchange="previewImg(this, 'right_preview')">
                <img th:src="@{${car.rightSideUrl}}" id="right_preview" class="upload-img" alt="우측" src="/img/car-right.png">
                <div class="upload-label">우측</div>
            </label>
            <label class="photo-upload-box">
                <input type="file" name="rear" accept="image/*" required onchange="previewImg(this, 'rear_preview')">
                <img th:src="@{${car.rearViewUrl}}" id="rear_preview" class="upload-img" alt="후면" src="/img/car-back.png">
                <div class="upload-label">후면</div>
            </label>
            <label class="photo-upload-box">
                <input type="file" name="driver" accept="image/*" required onchange="previewImg(this, 'driver_preview')">
                <img th:src="@{${car.driverSeatUrl}}" id="driver_preview" class="upload-img" alt="운전석" src="/img/car-dash.png">
                <div class="upload-label">운전석</div>
            </label>
            <label class="photo-upload-box">
                <input type="file" name="back" accept="image/*" required onchange="previewImg(this, 'back_preview')">
                <img th:src="@{${car.backSeatUrl}}" id="back_preview" class="upload-img" alt="뒷자석" src="/img/car-back.png">
                <div class="upload-label">뒷자석</div>
            </label>
        </div>
        <button type="submit" class="next-btn">사진 등록하고 다음</button>
    </form>
</div>
<script>
    // 미리보기
    function previewImg(input, targetId) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById(targetId).src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }
    // 6개 파일 모두 체크
    function validatePhotoCount() {
        const names = ['front','left','right','rear','driver','back'];
        for (let i = 0; i < names.length; i++) {
            if (document.querySelector('input[name="'+names[i]+'"]').files.length === 0) {
                alert('모든 사진을 업로드해야 합니다.');
                return false;
            }
        }
        return true;
    }
</script>
</body>
</html>
