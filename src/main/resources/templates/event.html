<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">
<body>
<div layout:fragment="content">

  <!-- 페이지 래퍼 -->
  <div class="evt-page" style="max-width:1180px;margin:0 auto;padding-top:18px;">

    <!-- 제목 -->
    <h2 style="font-size:16px;font-weight:700;margin:0 0 8px 0;">이벤트</h2>

    <!-- 상단 메인 박스 + 좌우 광고 -->
    <div class="evt-hero"
         style="display:grid;grid-template-columns:160px 1fr 160px;gap:18px;align-items:stretch;">
      <!-- 좌 광고 -->
      <div class="evt-ad" style="background:#fff;border:1px solid #eee;border-radius:8px;height:360px;display:flex;align-items:center;justify-content:center;">
        <img src="/img/ad_left.png" alt="ad" style="max-width:100%;max-height:100%;object-fit:contain;">
      </div>

      <!-- 가운데 메인 박스 -->
      <div class="evt-main"
           style="background:#fff;border:1px solid #e5e7eb;border-radius:8px;height:360px;display:flex;align-items:center;justify-content:center;position:relative;">
        <!-- 진행중 탭 내용(기본) -->
        <div id="tab-ongoing" class="evt-panel">
          <div style="text-align:center;color:#6b7280;">
            <!-- 선물아이콘(SVG) -->
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" style="opacity:.65;margin-bottom:10px;">
              <path d="M20 7h-3.17a3 3 0 0 0 .66-1.88A3.12 3.12 0 0 0 14.3 2.1 3 3 0 0 0 12 3.5 3 3 0 0 0 9.7 2.1 3.12 3.12 0 0 0 6.51 5.12 3 3 0 0 0 7.83 7H4a1 1 0 0 0-1 1v3h18V8a1 1 0 0 0-1-1ZM9 5a1.5 1.5 0 1 1 3 0v2H9V5Zm6 0a1.5 1.5 0 1 1-3 0v2h3V5ZM3 12v7a2 2 0 0 0 2 2h6v-9H3Zm10 0v9h6a2 2 0 0 0 2-2v-7h-8Z"
                    stroke="#9aa1a7" stroke-width="0.5" fill="#cbd5e1"/>
            </svg>
            <div style="font-size:20px;color:#374151;font-weight:700;">진행중인 이벤트가 없습니다.</div>
            <div style="margin-top:6px;font-size:14px;color:#9aa1a7;">새로운 이벤트로 찾아뵙겠습니다.</div>
          </div>
        </div>

        <!-- 지난 이벤트 -->
        <div id="tab-past" class="evt-panel" style="display:none;">
          <div style="padding:22px;">
            <div style="display:flex;gap:18px;flex-wrap:wrap;justify-content:center;">
              <div style="width:280px;border:1px solid #eee;border-radius:8px;overflow:hidden;background:#fff;">
                <div style="height:150px;background:#f3f4f6;"></div>
                <div style="padding:12px 14px;">
                  <div style="font-weight:700;color:#111;">여름맞이 할인 이벤트</div>
                  <div style="font-size:13px;color:#6b7280;margin-top:4px;">2024.08.01 ~ 2024.08.31</div>
                </div>
              </div>
              <div style="width:280px;border:1px solid #eee;border-radius:8px;overflow:hidden;background:#fff;">
                <div style="height:150px;background:#f3f4f6;"></div>
                <div style="padding:12px 14px;">
                  <div style="font-weight:700;color:#111;">전기차 시승 체험 이벤트</div>
                  <div style="font-size:13px;color:#6b7280;margin-top:4px;">2024.05.10 ~ 2024.06.10</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 당첨자 발표 -->
        <div id="tab-winners" class="evt-panel" style="display:none;">
          <div style="max-width:560px;margin:0 auto;text-align:left;">
            <h3 style="font-size:18px;font-weight:700;margin-bottom:12px;">최근 당첨자 발표</h3>
            <ul style="list-style:none;margin:0;padding:0;line-height:1.9;color:#374151;">
              <li><b>[전기차 시승 이벤트]</b> 홍길동(abc1234)</li>
              <li><b>[여름맞이 할인]</b> 김민수(kimcar)</li>
              <li><b>[내차자랑 댓글 이벤트]</b> 이지은(carlover)</li>
            </ul>
          </div>
        </div>
      </div>

      <!-- 우 광고 -->
      <div class="evt-ad" style="background:#fff;border:1px solid #eee;border-radius:8px;height:360px;display:flex;align-items:center;justify-content:center;">
        <img src="/img/ad_right.png" alt="ad" style="max-width:100%;max-height:100%;object-fit:contain;">
      </div>
    </div>

    <!-- 탭 버튼 바 -->
    <div class="evt-tabs"
         style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:0;margin-top:18px;">
      <button class="evt-tab-btn is-active" data-target="ongoing"
              style="height:44px;border:1px solid #e5e7eb;border-right:none;border-radius:4px 0 0 4px;background:#ff6a00;color:#fff;font-weight:700;cursor:pointer;">
        진행중인 이벤트
      </button>
      <button class="evt-tab-btn" data-target="past"
              style="height:44px;border:1px solid #e5e7eb;background:#fff;color:#6b7280;font-weight:600;cursor:pointer;">
        지난 이벤트
      </button>
      <button class="evt-tab-btn" data-target="winners"
              style="height:44px;border:1px solid #e5e7eb;border-left:none;border-radius:0 4px 4px 0;background:#fff;color:#6b7280;font-weight:600;cursor:pointer;">
        당첨자 발표
      </button>
    </div>

    <!-- 하단 구분선 -->
    <div style="height:24px;border-bottom:1px solid #e5e7eb;margin-top:18px;"></div>
  </div>

  <!-- 탭 스크립트 -->
  <script>
    (function(){
      const btns = document.querySelectorAll('.evt-tab-btn');
      const panels = {
        ongoing: document.getElementById('tab-ongoing'),
        past: document.getElementById('tab-past'),
        winners: document.getElementById('tab-winners')
      };

      function activate(target){
        // 버튼 스타일
        btns.forEach(b=>{
          b.classList.remove('is-active');
          b.style.background = '#fff';
          b.style.color = '#6b7280';
          b.style.fontWeight = '600';
        });
        const activeBtn = Array.from(btns).find(b=>b.dataset.target===target);
        activeBtn.classList.add('is-active');
        activeBtn.style.background = '#ff6a00';
        activeBtn.style.color = '#fff';
        activeBtn.style.fontWeight = '700';

        // 패널 전환
        Object.values(panels).forEach(p=>p.style.display='none');
        panels[target].style.display='block';
      }

      btns.forEach(b=>b.addEventListener('click',()=>activate(b.dataset.target)));
      // 초기상태
      activate('ongoing');
    })();
  </script>

</div>
</body>
</html>
