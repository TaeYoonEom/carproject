<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인 - Encar</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .login-container {
        max-width: 400px;
        margin: 60px auto;
        padding: 30px;
        border: 1px solid #eee;
        border-radius: 10px;
        text-align: center;
        background-color: #fff;
    }
    .login-title {
        font-size: 32px;
        font-weight: bold;
        color: red;
        margin-bottom: 30px;
    }
    .login-input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    .login-checkbox {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        margin-bottom: 15px;
    }
    .login-button {
        width: 100%;
        padding: 12px;
        background-color: #ccc;
        color: #fff;
        border: none;
        border-radius: 5px;
        font-size: 16px;
        margin: 10px 0 20px;
        cursor: pointer;
    }
    .login-links {
        font-size: 14px;
        color: #555;
    }
    .login-links a {
        margin: 0 10px;
        color: #333;
        text-decoration: none;
    }
    .login-links a:hover {
        text-decoration: underline;
    }
    .login-footer {
        margin-top: 30px;
        font-size: 12px;
        color: #999;
    }
  </style>
</head>
<body>
<div class="login-container">
  <div class="login-title">Encar</div>
  <form action="/login" method="post">
    <div class="login-checkbox">
      <input type="checkbox" id="rememberId">
      <label for="rememberId">아이디 저장</label>
    </div>
    <input type="text" class="login-input" placeholder="아이디" name="username" required>
    <input type="password" class="login-input" placeholder="비밀번호" name="password" required>
    <button type="submit" class="login-button">로그인</button>
  </form>
  <div class="login-links">
    <a href="#">아이디 찾기</a> |
    <a href="#">비밀번호 찾기</a> |
    <a href="/register">회원가입</a>
  </div>
  <div class="login-footer">
    © Encar 1599-5455
  </div>
</div>
</body>
</html>
