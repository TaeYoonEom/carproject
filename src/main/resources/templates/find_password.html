<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 찾기 - Encar</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .find-container {
      max-width: 400px;
      margin: 60px auto;
      padding: 30px;
      border: 1px solid #eee;
      border-radius: 10px;
      text-align: center;
      background-color: #fff;
    }
    .find-title {
      font-size: 28px;
      font-weight: bold;
      color: red;
      margin-bottom: 20px;
    }
    .find-input, .find-button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      font-size: 16px;
      border-radius: 5px;
    }
    .find-button {
      background-color: red;
      color: white;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .error-message {
      color: red;
      font-size: 14px;
      margin-top: 15px;
    }
  </style>
</head>
<body>
<div class="find-container">
  <div class="find-title">비밀번호 찾기</div>

  <!-- ✅ 이 부분만 기존 코드에 추가 또는 교체 -->
  <form action="/find-password" method="post">
    <input type="text" name="name" class="find-input" placeholder="이름" required>
    <input type="text" name="username" class="find-input" placeholder="아이디" required>
    <input type="text" name="phone" class="find-input" placeholder="전화번호" required>
    <button type="submit" class="find-button">비밀번호 재설정</button>

    <!-- ✅ 1. 비밀번호 재설정 전 -->
    <div th:if="${emailSent == null}">
      <div style="margin-top: 15px; font-size: 14px;">
        <a href="/login" style="text-decoration: none; color: #333; margin-right: 10px;">로그인</a> |
        <a href="/find-id" style="text-decoration: none; color: #333; margin-left: 10px;">아이디 찾기</a>
      </div>
    </div>
  </form>

  <!-- ✅ 에러 메시지 -->
  <div class="error-message" th:if="${error}" th:text="${error}"></div>

  <!-- ✅ 2. 비밀번호 재설정 후 -->
  <div th:if="${emailSent}">
    <div style="margin-top: 15px; font-size: 15px; color: #333;">
      <a href="/login" style="text-decoration: none; color: #333; margin-right: 10px;">로그인</a> |
      <a th:href="@{/reset-password(username=${username})}" style="text-decoration: none; color: #333; margin-left: 10px;">비밀번호 변경</a>
    </div>
  </div>
</div>


  <script th:inline="javascript">
  /*<![CDATA[*/
    if ([[${emailSent}]] === true) {
      alert("비밀번호가 이메일로 전송되었습니다. 이메일을 확인해 주세요.");
    }

    if ([[${error != null}]] === true) {
      alert([[${error}]]);
    }
  /*]]>*/
</script>
</body>
</html>
