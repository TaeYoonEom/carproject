<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 재설정</title>
  <style>
    .container {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      border: 1px solid #ccc;
      text-align: center;
    }
    input, button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
    }
    button {
      background-color: red;
      color: white;
      border: none;
      font-weight: bold;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>새 비밀번호 설정</h2>
  <form action="/reset-password" method="post">
    <input type="hidden" name="username" th:value="${username}">
    <input type="password" name="tempPassword" placeholder="임시 비밀번호" required>
    <input type="password" name="newPassword" placeholder="새 비밀번호" required>
    <button type="submit">비밀번호 변경</button>
    <div th:if="${error}" style="color: red; margin-top: 10px;" th:text="${error}"></div>
  </form>
</div>
</body>
</html>
