<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">

<head>
  <style>
    /* ===== 상단 서브탭 ===== */
    .subtabs-wrap {
        max-width:1180px;
        margin:16px auto 0;
        display:flex;
        gap:8px;
    }
    .subtab {
        padding:8px 14px;
        border:1px solid #e5e7eb;
        border-radius:20px;
        background:#fff;
        color:#111;
        text-decoration:none;
    }
    .subtab.active{
        font-weight:600;
        background:#111;
        color:#fff;
    }

    /* ===== 메인 히어로 ===== */
    .media-hero {
        max-width:1180px;
        margin:20px auto 0;
        display:grid;
        grid-template-columns:2fr 1fr;
        gap:20px;
    }
    .hero-left{
        position:relative;
        border-radius:12px;
        overflow:hidden;
        background:#000;
    }
    .hero-left img{
        width:100%;
        height:100%;
        display:block;
        object-fit:cover;
    }
    .hero-caption{
        position:absolute;
        left:16px;
        bottom:16px;
        color:#fff;
        background:rgba(0,0,0,.45);
        padding:12px 14px;
        border-radius:10px;
        backdrop-filter:blur(2px);
    }
    .hero-caption .title{
        font-size:18px;
        font-weight:700;
    }
    .hero-caption .desc{
        font-size:13px;
        opacity:.9;
        margin-top:4px;
    }

    /* 좌우 네비 버튼 */
    .nav{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        width:36px;
        height:36px;
        border:none;
        border-radius:50%;
        background:rgba(255,255,255,.9);
        cursor:pointer;
    }
    .nav.prev{ left:10px; }
    .nav.next{ right:10px; }

    /* ===== 우측 작은 카드 ===== */
    .hero-right{
        display:grid;
        grid-template-rows:1fr 1fr;
        gap:20px;
    }
    .side-card{
        position:relative;
        display:block;
        border-radius:12px;
        overflow:hidden;
        background:#000;
        text-decoration:none;
    }
    .side-card img{
        width:100%;
        height:100%;
        object-fit:cover;
    }
    .side-caption{
        position:absolute;
        left:12px;
        bottom:12px;
        color:#fff;
        background:rgba(0,0,0,.45);
        padding:8px 10px;
        border-radius:8px;
        font-weight:600;
    }

    /* ===== 동영상 리스트 ===== */
    .video-list{
        max-width:1180px;
        margin:30px auto 60px;
    }
    .video-grid{
        display:grid;
        grid-template-columns:repeat(3,1fr);
        gap:20px;
    }
    .video-card{
        display:block;
        border:1px solid #eee;
        border-radius:12px;
        overflow:hidden;
        text-decoration:none;
        background:#fff;
        color:#111;
    }
    .video-card img{
        width:100%;
        display:block;
        object-fit:cover;
    }
    .video-time{
        position:absolute;
        right:8px;
        bottom:8px;
        background:rgba(0,0,0,.65);
        color:#fff;
        padding:2px 6px;
        border-radius:6px;
        font-size:12px;
    }
  </style>
</head>

<body>
<div layout:fragment="content">

  <!-- 상단 서브탭 -->
  <div class="subtabs-wrap">
    <a href="/media" class="subtab active">미디어</a>
    <a href="/hotdeal" class="subtab">핫딜</a>
    <a href="/news" class="subtab">뉴스</a>
    <a href="/guide" class="subtab">가이드</a>
    <a href="/feature" class="subtab">특집</a>

    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
      <input type="text" placeholder="검색어를 입력하세요"
             style="height:36px;width:260px;border:1px solid #e5e7eb;border-radius:8px;padding:0 12px;">
      <button type="button"
              style="height:36px;padding:0 14px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;">
        검색
      </button>
    </div>
  </div>

  <!-- 메인 히어로 -->
  <section class="media-hero">

    <!-- 좌측 메인 썸네일 -->
    <div class="hero-left">
      <img src="/img/media_main1.jpg" alt="메인">
      <div class="hero-caption">
        <div class="title">공학기술의 집약체, 현대 아이오닉6 N 신차 리뷰</div>
        <div class="desc">현대차의 고성능 전기세단, 아이오닉6 N의 핵심을 한눈에.</div>
      </div>
      <button class="nav prev">←</button>
      <button class="nav next">→</button>
    </div>

    <!-- 우측 작은 카드 -->
    <div class="hero-right">
      <a href="#" class="side-card">
        <img src="/img/media_side1.jpg">
        <div class="side-caption">전력이 없는 퍼포먼스, 볼보 EX30 시승기</div>
      </a>
      <a href="#" class="side-card">
        <img src="/img/media_side2.jpg">
        <div class="side-caption">결정적 승부수, BYD 오토 세단 신차 리뷰</div>
      </a>
    </div>
  </section>

  <!-- 동영상 리스트 -->
  <section class="video-list">
    <h3 style="font-size:20px;margin-bottom:14px;">동영상</h3>

    <div class="video-grid">

      <a href="#" class="video-card">
        <div style="position:relative;">
          <img src="/img/media_v1.jpg">
          <span class="video-time">20:21</span>
        </div>
        <div style="padding:12px 14px;">
          <div style="font-weight:700;line-height:1.35;">(시승기) 기아 EV4 첫인상</div>
          <div style="font-size:12px;color:#6b7280;margin-top:6px;">2025.09.29</div>
        </div>
      </a>

      <a href="#" class="video-card">
        <div style="position:relative;">
          <img src="/img/media_v2.jpg">
          <span class="video-time">20:41</span>
        </div>
        <div style="padding:12px 14px;">
          <div style="font-weight:700;line-height:1.35;">르노 세단 하이브리드 리뷰</div>
          <div style="font-size:12px;color:#6b7280;margin-top:6px;">2025.09.24</div>
        </div>
      </a>

      <a href="#" class="video-card">
        <div style="position:relative;">
          <img src="/img/media_v3.jpg">
          <span class="video-time">20:07</span>
        </div>
        <div style="padding:12px 14px;">
          <div style="font-weight:700;line-height:1.35;">폭스바겐 투아렉 R-Line</div>
          <div style="font-size:12px;color:#6b7280;margin-top:6px;">2025.08.11</div>
        </div>
      </a>

    </div>
  </section>

</div>
</body>
</html>
