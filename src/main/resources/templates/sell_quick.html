<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}"
      lang="ko">
<head>
    <title>빠른 차량 판매</title>

    <!-- ✅ 개별 CSS 추가 -->
    <th:block layout:fragment="style">
        <link rel="stylesheet" th:href="@{/css/sell_quick.css}">
    </th:block>
</head>
<body>

<!-- ✅ 본문 삽입 -->
<div layout:fragment="content">
    <div class="quick-container">

        <!-- 상단 안내 -->
        <h2 class="title">내 차의 최고가 견적을 확인하세요.</h2>

        <!-- 차량번호 입력창 -->
        <div class="input-box">
            <input type="text" id="carNumber" placeholder="123가4567" />
            <button id="checkBtn">조회</button>
        </div>

        <!-- 로그인 여부 dataset 전달 -->
        <div id="auth-status" th:data-authenticated="${#authorization.expression('isAuthenticated()')}"></div>

        <!-- 보조 링크 -->
        <div class="helper-links">
            <a href="#">내 차량 전체보기</a>
            <a href="#">이용안내 가이드</a>
        </div>

        <hr>

        <!-- 설명 박스 -->
        <section class="info-section">
            <h3>엔카 비교견적은?</h3>
            <div class="info-boxes">
                <div class="info-box">
                    <p><strong>비교견적 신청까지 단 1분!</strong><br>이용안내 가이드</p>
                </div>
                <div class="info-box">
                    <p><strong>최고가 견적 확인 후 판매는 선택의 자유!</strong><br>내차 정보 입력하면 딜러가 경쟁해 실시간 최고가 선택</p>
                </div>
                <div class="info-box red">
                    <p><strong>엔카가 모든 거래내역을 모니터링 합니다.</strong><br>고객안심 센터 운영</p>
                </div>
            </div>
        </section>

    </div>
</div>

<!-- ✅ 자바스크립트 삽입 -->
<th:block layout:fragment="script">
    <script>
        document.addEventListener("DOMContentLoaded", function () {
          const checkBtn = document.getElementById("checkBtn");
          checkBtn.addEventListener("click", function () {
            const carNumber = document.getElementById("carNumber").value.trim();
            const isAuthenticated = document.getElementById("auth-status").dataset.authenticated === "true";

            if (!carNumber) {
              alert("차량 번호를 입력해주세요.");
              return;
            }

            if (!isAuthenticated) {
              alert("로그인이 필요합니다. 로그인 후 다시 시도해주세요.");
              window.open(
                "/sell/detail/owner?carNumber=" + encodeURIComponent(carNumber),
                "ownerWindow",
                "width=500,height=800,top=100,left=200,resizable=no"
              );
              return;
            }

            // 새 창으로 이동
                        // 기존 handleCarCheck 함수 내 window.open 부분만 수정
            window.open(
              "/sell/detail/owner?carNumber=" + encodeURIComponent(carNumber),
              "ownerWindow",
              "width=500,height=800,top=100,left=200,resizable=no"
            );
          });
        });
    </script>
</th:block>

</body>
</html>
