<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">

<head>
    <title>국산차 검색</title>

    <!-- ✅ base.html의 style fragment에 삽입됨 -->
    <link rel="stylesheet" href="/css/cate_gory.css" layout:fragment="style"/>
</head>

<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">

<body>
<div layout:fragment="content">
    <div class="page-wrapper">
        <!-- 좌측 필터 영역 -->
        <aside class="sidebar-left encar-filters">
            <div class="filter-header">
                <div class="header-top">
                    <span class="label">국산차 검색</span>
                </div>
                <div class="count-reset">
                    <span class="allcount">
                      <strong th:text="${#numbers.formatInteger(totalCount, 1, 'COMMA')}">0</strong>대
                    </span>
                    <button type="button" class="btn-reset" aria-label="선택 초기화">
                        <span class="ico-rotate" aria-hidden="true">↻</span>
                        선택 초기화
                    </button>
                </div>
                <div class="recent-search">
                    <button type="button" class="btn-recent">
                      <span class="ico-search" aria-hidden="true">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <circle cx="11" cy="11" r="7" stroke="#9aa1a7" stroke-width="2"/>
                          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#9aa1a7" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                      </span>
                        최근 검색 조건
                    </button>
                </div>
            </div>

            <!-- 차종 -->
            <details class="filter-group" open>
                <summary>차종</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${carTypeCounts}">
                        <label>
                            <input type="checkbox" name="carTypes"
                                   th:value="${e.key}"
                                   th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">중형차</span>
                            <span class="count"
                                  th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 제조사 / 모델 / 등급 -->
            <details class="filter-group" open>
                <summary>제조사/모델/등급</summary>
                <ul class="filter-list with-count" id="facet-makers">
                    <li th:each="e : ${manufacturerCounts}">
                        <label>
                            <input type="checkbox" name="manufacturers" th:value="${e.key}">
                            <span th:text="${e.key}">현대</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
                <div id="facet-models" hidden></div>
            </details>

            <!-- 연식 -->
            <details class="filter-group" open>
                <summary>연식</summary>
                <div class="filter-range styled-range">
                    <div class="range-row">
                        <div class="selects">
                            <select id="yearFrom" class="styled-select">
                                <option value="">년</option>
                            </select>
                            <select id="monthFrom" class="styled-select">
                                <option value="">월</option>
                            </select>
                            <span class="suffix">부터</span>
                        </div>
                    </div>

                    <div class="range-row">
                        <div class="selects">
                            <select id="yearTo" class="styled-select">
                                <option value="">년</option>
                            </select>
                            <select id="monthTo" class="styled-select">
                                <option value="">월</option>
                            </select>
                            <span class="suffix">까지</span>
                        </div>
                    </div>
                </div>
            </details>

            <!-- 주행거리 -->
            <details class="filter-group" open>
                <summary>주행거리</summary>
                <div class="filter-range styled-range">
                    <div class="range-row">
                        <div class="selects">
                            <select id="mileageFrom" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">부터</span>
                        </div>
                    </div>

                    <div class="range-row">
                        <div class="selects">
                            <select id="mileageTo" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">까지</span>
                        </div>
                    </div>

                    <!--<button type="button" class="btn-interval">구간선택 열기</button>-->
                </div>
            </details>

            <!-- ✅ 가격 -->
            <details class="filter-group" open>
                <summary>가격</summary>
                <div class="filter-range styled-range">
                    <div class="range-row">
                        <div class="selects">
                            <select id="priceFrom" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">부터</span>
                        </div>
                    </div>

                    <div class="range-row">
                        <div class="selects">
                            <select id="priceTo" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">까지</span>
                        </div>
                    </div>

                    <!--<button type="button" class="btn-interval">구간선택 열기</button>-->
                </div>
            </details>

            <!-- 지역 -->
            <details class="filter-group" open>
                <summary>지역</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${saleLocationCounts}">
                        <label>
                            <input type="checkbox" name="saleLocations"
                                   th:value="${e.key}"
                                   th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">경기</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
                <!-- 원하면 '다른 지역 더보기'는 CSS로 높이 제한 + 토글 -->
            </details>

            <!-- 인승 -->
            <details class="filter-group" open>
                <summary>인승</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${capacityBucketCounts}">
                        <label>
                            <input type="checkbox" class="cap-bucket"
                                   th:data-bucket="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">5인승</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>


            <!-- 성능 / 보험 공개 -->
            <details class="filter-group" open>
                <summary>성능/보험공개</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${performanceOpenCounts}">
                        <label>
                            <input type="checkbox" name="performanceOpen" th:value="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">성능기록부</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>


            <!-- 판매자 구분 -->
            <details class="filter-group" open>
                <summary>판매자구분</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${sellerTypeCounts}">
                        <label>
                            <input type="checkbox" name="sellerTypes" th:value="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">개인</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 판매 방식 -->
            <details class="filter-group" open>
                <summary>판매방식</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${saleMethodCounts}">
                        <label>
                            <input type="checkbox" name="saleMethods" th:value="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">일반</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>


            <!-- 외부 색상 -->
            <details class="filter-group" open>
                <summary>외부색상</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${exteriorColorCounts}">
                        <label>
                            <input type="checkbox" name="exteriorColors" th:value="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">흰색</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 내부 색상 -->
            <details class="filter-group" open>
                <summary>내부색상</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${interiorColorCounts}">
                        <label>
                            <input type="checkbox" name="interiorColors"
                                   th:value="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">검정색 계열</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
                <!-- 필요시 '다른 색상 더보기'는 CSS/JS로 토글 -->
            </details>

            <!-- 연료 -->
            <details class="filter-group" open>
                <summary>연료</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${fuelTypeCounts}">
                        <label>
                            <input type="checkbox" name="fuelTypes"
                                   th:value="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">가솔린</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 변속기 -->
            <details class="filter-group" open>
                <summary>변속기</summary>
                <ul class="filter-list with-count">
                    <li th:each="e : ${transmissionCounts}">
                        <label>
                            <input type="checkbox" name="transmissions"
                                   th:value="${e.key}" th:disabled="${e.value == 0}">
                            <span th:text="${e.key}">오토</span>
                            <span class="count" th:text="${#numbers.formatInteger(e.value,1,'COMMA')}">0</span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 옵션 -->
            <details class="filter-group">
                <summary>옵션</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 선푸르</label></li>
                    <li><label><input type="checkbox"> 내비게이션</label></li>
                    <li><label><input type="checkbox"> 스마트키</label></li>
                    <li><label><input type="checkbox"> 헤드램프(HID)</label></li>
                    <li><label><input type="checkbox"> 후방 카메라</label></li>
                    <li><label><input type="checkbox"> 가죽시트</label></li>
                    <li><label><input type="checkbox"> 에어백(동승석)</label></li>
                    <li><label><input type="checkbox"> 에어백(사이드)</label></li>
                </ul>
            </details>

            <!-- 차량번호 / 판매자 이름 -->
            <details class="filter-group">
                <summary>차량번호 / 판매자 이름</summary>
                <ul class="filter-list">
                    <input type="text" placeholder="차량번호 또는 이름 입력">
                </ul>
            </details>
        </aside>

        <!-- 중앙 배너 영역 -->
        <main class="content">
            <div class="car-list">
                <div th:replace="buy/partials/_car_cards :: list"></div>
            </div>
        </main>

        <!-- 📦 우측 배너 영역 -->
        <aside class="sidebar-right">
            <div class="widget">
                <ul class="service-list">
                    <li>
                        <span class="icon blue">₩</span>
                        보험료 조회
                    </li>
                    <li>
                        <span class="icon gold">₩</span>
                        대출한도 조회
                    </li>
                </ul>
            </div>
        </aside>
    </div>
</div>
<div class="footer">
    ⓒ 2025 N카. All rights reserved.
</div>

<th:block layout:fragment="script">
    <script defer src="/js/base.js"></script>
    <script defer src="/js/wishlist.js"></script>
    <script defer src="/js/filter_init.js"></script>
    <script defer src="/js/korean-filter.js"></script>
</th:block>

</body>
</html>
