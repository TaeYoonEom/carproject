<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">

<head>
    <title>국산차 검색</title>

    <!-- ✅ base.html의 style fragment에 삽입됨 -->
    <link rel="stylesheet" href="/css/cate_gory.css" layout:fragment="style"/>
</head>

<meta name="_csrf" th:content="${_csrf.token}">
<meta name="_csrf_header" th:content="${_csrf.headerName}">

<body>
<div layout:fragment="content">

    <div class="page-wrapper">
        <!-- 좌측 필터 영역 -->
        <aside class="sidebar-left encar-filters">
            <div class="filter-header">
                <div class="header-top">
                    <span class="label">국산차 검색</span>
                </div>
                <div class="count-reset">
                    <span class="allcount">
                      <strong th:text="${#numbers.formatInteger(totalCount, 1, 'COMMA')}">0</strong>대
                    </span>
                    <button type="button" class="btn-reset" aria-label="선택 초기화">
                        <span class="ico-rotate" aria-hidden="true">↻</span>
                        선택 초기화
                    </button>
                </div>
                <div class="recent-search">
                    <button type="button" class="btn-recent">
                      <span class="ico-search" aria-hidden="true">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <circle cx="11" cy="11" r="7" stroke="#9aa1a7" stroke-width="2"/>
                          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#9aa1a7" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                      </span>
                        최근 검색 조건
                    </button>
                </div>
            </div>

            <!-- 차종 -->
            <details class="filter-group" open>
                <summary>차종</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox" name="ct" value="KE"> 경차</label></li>
                    <li><label><input type="checkbox" name="ct" value="SM"> 소형차</label></li>
                    <li><label><input type="checkbox" name="ct" value="JM"> 준중형차</label></li>
                    <li><label><input type="checkbox" name="ct" value="MD"> 중형차</label></li>
                    <li><label><input type="checkbox" name="ct" value="LG"> 대형차</label></li>
                    <li><label><input type="checkbox" name="ct" value="SC"> 스포츠카</label></li>
                    <li><label><input type="checkbox" name="ct" value="SUV"> SUV</label></li>
                    <li><label><input type="checkbox" name="ct" value="RV"> RV</label></li>
                    <li><label><input type="checkbox" name="ct" value="VN"> 승합차</label></li>
                    <li><label><input type="checkbox" name="ct" value="TR"> 화물차</label></li>
                    <li><label><input type="checkbox" name="ct" value="ET"> 기타</label></li>
                </ul>
            </details>

            <!-- 제조사 / 모델 / 등급 -->
            <details class="filter-group" open>
                <summary>제조사/모델/등급</summary>
                <ul class="filter-list with-count">
                    <li>
                        <label><input type="checkbox" name="brand" value="현대"> 현대</label>

                    </li>
                    <li>
                        <label><input type="checkbox" name="brand" value="제네시스"> 제네시스</label>

                    </li>
                    <li>
                        <label><input type="checkbox" name="brand" value="기아"> 기아</label>

                    </li>
                    <!-- 필요 브랜드 계속... -->
                </ul>
            </details>

            <!-- 연식 -->
            <details class="filter-group" open>
                <summary>연식</summary>
                <div class="range-rows">
                    <div class="range-row">
                        <div class="selects">
                            <select name="year_from_y">
                                <option value="">년</option>

                            </select>
                            <select name="year_from_m">
                                <option value="">월</option>

                            </select>
                        </div>
                        <span class="suffix">부터</span>
                    </div>
                    <div class="range-row">
                        <div class="selects">
                            <select name="year_to_y">
                                <option value="">년</option>

                            </select>
                            <select name="year_to_m">
                                <option value="">월</option>

                            </select>
                        </div>
                        <span class="suffix">까지</span>
                    </div>
                    <button type="button" class="btn-interval">구간선택 열기</button>
                </div>
            </details>

            <!-- 주행거리 -->
            <details class="filter-group" open>
                <summary>주행거리</summary>
                <div class="range-rows">
                    <div class="range-row">
                        <div class="selects">
                            <select name="mile_from">
                                <option value="">선택</option>
                                <option value="0">0km</option>
                                <option value="10000">1만</option>
                                <option value="30000">3만</option>
                                <option value="50000">5만</option>
                                <option value="100000">10만</option>
                            </select>
                        </div>
                        <span class="suffix">부터</span>
                    </div>
                    <div class="range-row">
                        <div class="selects">
                            <select name="mile_to">
                                <option value="">선택</option>
                                <option value="30000">3만</option>
                                <option value="50000">5만</option>
                                <option value="100000">10만</option>
                                <option value="150000">15만</option>
                                <option value="200000">20만</option>
                            </select>
                        </div>
                        <span class="suffix">까지</span>
                    </div>
                    <button type="button" class="btn-interval">구간선택 열기</button>
                </div>
            </details>

            <!-- 가격 -->
            <details class="filter-group" open>
                <summary>가격</summary>
                <div class="range-rows">
                    <div class="range-row">
                        <div class="selects">
                            <select name="price_from">
                                <option value="">선택</option>
                                <option value="0">0만원</option>
                                <option value="500">500</option>
                                <option value="1000">1,000</option>
                                <option value="2000">2,000</option>
                                <option value="3000">3,000</option>
                            </select>
                        </div>
                        <span class="suffix">부터</span>
                    </div>
                    <div class="range-row">
                        <div class="selects">
                            <select name="price_to">
                                <option value="">선택</option>
                                <option value="1000">1,000</option>
                                <option value="2000">2,000</option>
                                <option value="3000">3,000</option>
                                <option value="5000">5,000</option>
                                <option value="10000">10,000</option>
                            </select>
                        </div>
                        <span class="suffix">까지</span>
                    </div>

                    <label class="manual">
                        <input type="checkbox" id="price-direct"> 직접입력
                    </label>

                    <div class="manual-inputs" hidden>
                        <input type="number" name="price_from_input" placeholder="최소 만원">
                        <span class="tilde">~</span>
                        <input type="number" name="price_to_input" placeholder="최대 만원">
                    </div>

                    <button type="button" class="btn-interval">구간선택 열기</button>
                </div>
            </details>

            <!-- 지역 -->
            <details class="filter-group">
                <summary>지역</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 경기</label></li>
                    <li><label><input type="checkbox"> 대구</label></li>
                    <li><label><input type="checkbox"> 부산</label></li>
                    <li><label><input type="checkbox"> 서울</label></li>
                    <li><label><input type="checkbox"> 인천</label></li>
                </ul>
            </details>

            <!-- 인승 -->
            <details class="filter-group">
                <summary>인승</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 2인승 이하</label></li>
                    <li><label><input type="checkbox"> 3인승</label></li>
                    <li><label><input type="checkbox"> 4인승</label></li>
                    <li><label><input type="checkbox"> 5인승</label></li>
                    <li><label><input type="checkbox"> 6인승</label></li>
                    <li><label><input type="checkbox"> 7인승</label></li>
                    <li><label><input type="checkbox"> 8인승</label></li>
                    <li><label><input type="checkbox"> 9인승</label></li>
                    <li><label><input type="checkbox"> 10인승 이상</label></li>
                </ul>
            </details>

            <!-- 성능 / 보험 공개 -->
            <details class="filter-group">
                <summary>성능 / 보험 공개</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 엔카 직영 성능점검</label></li>
                    <li><label><input type="checkbox"> 성능기록부</label></li>
                    <li><label><input type="checkbox"> 보험이력</label></li>
                    <li><label><input type="checkbox"> 차량 이력 공개</label></li>
                </ul>
            </details>

            <!-- 판매자 구분 -->
            <details class="filter-group">
                <summary>판매자 구분</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 개인</label></li>
                    <li><label><input type="checkbox"> 딜러</label></li>
                    <li><label><input type="checkbox"> 리스렌트제휴</label></li>
                </ul>
            </details>

            <!-- 판매 방식 -->
            <details class="filter-group">
                <summary>판매 방식</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 일반</label></li>
                    <li><label><input type="checkbox"> 렌트</label></li>
                    <li><label><input type="checkbox"> 리스</label></li>
                </ul>
            </details>

            <!-- 외부 색상 -->
            <details class="filter-group">
                <summary>외부 색상</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 흰색</label></li>
                    <li><label><input type="checkbox"> 검정색</label></li>
                    <li><label><input type="checkbox"> 쥐색</label></li>
                    <li><label><input type="checkbox"> 청색</label></li>
                    <li><label><input type="checkbox"> 은색</label></li>
                </ul>
            </details>

            <!-- 내부 색상 -->
            <details class="filter-group">
                <summary>내부 색상</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 검정색 계열</label></li>
                    <li><label><input type="checkbox"> 갈색 계열</label></li>
                    <li><label><input type="checkbox"> 베이지색 계열</label></li>
                    <li><label><input type="checkbox"> 회색 계열</label></li>
                    <li><label><input type="checkbox"> 흰색 계열</label></li>
                </ul>
            </details>

            <!-- 연료 -->
            <details class="filter-group">
                <summary>연료</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 가솔린</label></li>
                    <li><label><input type="checkbox"> 디젤</label></li>
                    <li><label><input type="checkbox"> LPG(일반인 구입)</label></li>
                    <li><label><input type="checkbox"> LPG</label></li>
                    <li><label><input type="checkbox"> 가솔린+전기</label></li>
                    <li><label><input type="checkbox"> LPG+전기</label></li>
                    <li><label><input type="checkbox"> 가솔린+LPG</label></li>
                    <li><label><input type="checkbox"> 가솔린+CNG</label></li>
                    <li><label><input type="checkbox"> 전기</label></li>
                    <li><label><input type="checkbox"> 수소</label></li>
                    <li><label><input type="checkbox"> LNG</label></li>
                    <li><label><input type="checkbox"> CNG</label></li>
                </ul>
            </details>

            <!-- 변속기 -->
            <details class="filter-group">
                <summary>변속기</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 오토</label></li>
                    <li><label><input type="checkbox"> 수동</label></li>
                    <li><label><input type="checkbox"> 세미오토</label></li>
                    <li><label><input type="checkbox"> CVT</label></li>
                    <li><label><input type="checkbox"> 기타</label></li>
                </ul>
            </details>

            <!-- 옵션 -->
            <details class="filter-group">
                <summary>옵션</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 선푸르</label></li>
                    <li><label><input type="checkbox"> 내비게이션</label></li>
                    <li><label><input type="checkbox"> 스마트키</label></li>
                    <li><label><input type="checkbox"> 헤드램프(HID)</label></li>
                    <li><label><input type="checkbox"> 후방 카메라</label></li>
                    <li><label><input type="checkbox"> 가죽시트</label></li>
                    <li><label><input type="checkbox"> 에어백(동승석)</label></li>
                    <li><label><input type="checkbox"> 에어백(사이드)</label></li>
                </ul>
            </details>

            <!-- 차량번호 / 판매자 이름 -->
            <details class="filter-group">
                <summary>차량번호 / 판매자 이름</summary>
                <ul class="filter-list">
                    <input type="text" placeholder="차량번호 또는 이름 입력">
                </ul>
            </details>
        </aside>

        <!-- 가운데 차량 카드 영역 -->
        <main class="content">
            <div class="section-title">사진우대</div>
            <div class="encar-grid">
                <article class="encar-card"
                         th:each="car : ${carList.subList(0, 8)}"
                         th:with="
               cidRaw=${car.car != null and car.car.carId != null ? car.car.carId : (car.carId != null ? car.carId : 0)},
               cidInt=${T(java.lang.Integer).valueOf(cidRaw)}
             "
                         th:data-url="@{/cars/{id}(id=${cidInt})}"
                         style="cursor:pointer">

                    <!-- 하트 버튼 -->
                    <button type="button"
                            class="wish-btn"
                            th:data-car-id="${cidInt}"
                            th:classappend="${wishSet != null and wishSet.contains(cidInt)} ? ' on' : ''"
                            aria-label="찜하기" title="찜하기">
                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                            <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4 3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4 18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>

                    <!-- 차량 이미지 -->
                    <a th:href="@{/cars/{id}(id=${cidInt})}">
                        <img class="encar-img" th:src="@{${car.frontViewUrl}}" alt="차량 이미지">
                    </a>

                    <div class="encar-info">
                        <a class="encar-title"
                           th:href="@{/cars/{id}(id=${cidInt})}"
                           th:text="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량명')}">차량명</a>

                        <div class="encar-category"
                             th:utext="${car.year} + '년 | ' + ${car.mileage} + 'km<br/>' + ${car.driveType} + ' | ' + ${car.saleLocation}">
                        </div>

                        <div class="encar-price"
                             th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'"></div>
                    </div>
                </article>
            </div>

            <!-- 우대등록 -->
            <div class="section-title">우대등록</div>
            <table class="premium-table">
                <thead>
                <tr><th>사진</th><th>차량정보</th><th>가격</th></tr>
                </thead>
                <tbody>
                <tr th:each="car, stat : ${carList}"
                    th:if="${stat.index} < 8"
                    th:with="
                  cidRaw=${car.car != null && car.car.carId != null ? car.car.carId : (car.carId != null ? car.carId : 0)},
                  cidInt=${T(java.lang.Integer).valueOf(cidRaw)}
                ">
                    <td class="thumb-cell">
                        <!-- 하트 버튼 -->
                        <button type="button"
                                class="wish-btn small"
                                th:data-car-id="${cidInt}"
                                th:classappend="${wishSet != null and wishSet.contains(cidInt)} ? ' on' : ''"
                                aria-label="찜하기" title="찜하기">
                            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4 3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4 18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <a class="cell-link" th:href="@{/cars/{id}(id=${cidInt})}">
                            <img class="thumb" th:src="@{${car.frontViewUrl}}"
                                 th:alt="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량 이미지')}">
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{/cars/{id}(id=${cidInt})}">
                            <div class="encar-title"
                                 th:text="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량명')}">차량명</div>
                            <div class="encar-category"
                                 th:text="${car.year} + '년 | ' + ${car.mileage} + 'km | ' + ${car.saleLocation}">정보</div>
                            <div class="encar-tag">
                                <span class="tag" th:if="${car.ownershipStatus == '소유중'}">무사고</span>
                                <span class="tag">1인소유</span>
                            </div>
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{/cars/{id}(id=${cidInt})}">
          <span class="encar-price"
                th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'">가격</span>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <!-- 일반등록 -->
            <div class="section-title">일반등록</div>
            <table class="premium-table">
                <thead>
                <tr><th>사진</th><th>차량정보</th><th>가격</th></tr>
                </thead>
                <tbody>
                <tr th:each="car : ${carList}"
                    th:with="
                  cidRaw=${car.car != null && car.car.carId != null ? car.car.carId : (car.carId != null ? car.carId : 0)},
                  cidInt=${T(java.lang.Integer).valueOf(cidRaw)}
                ">
                    <td class="thumb-cell">
                        <button type="button"
                                class="wish-btn small"
                                th:data-car-id="${cidInt}"
                                th:classappend="${wishSet != null and wishSet.contains(cidInt)} ? ' on' : ''"
                                aria-label="찜하기" title="찜하기">
                            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4 3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4 18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <a class="cell-link" th:href="@{/cars/{id}(id=${cidInt})}">
                            <img class="thumb" th:src="@{${car.frontViewUrl}}"
                                 th:alt="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량 이미지')}">
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{/cars/{id}(id=${cidInt})}">
                            <div class="encar-title"
                                 th:text="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량명')}">차량명</div>
                            <div class="encar-category"
                                 th:text="${car.year} + '년 | ' + ${car.mileage} + 'km | ' + ${car.saleLocation}">정보</div>
                            <div class="encar-tag">
                                <span class="tag" th:if="${car.ownershipStatus == '소유중'}">무사고</span>
                                <span class="tag">1인소유</span>
                            </div>
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{/cars/{id}(id=${cidInt})}">
          <span class="encar-price"
                th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'">가격</span>
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </main>




        <!-- 📦 우측 배너 영역 -->
        <aside class="sidebar-right">
            <div class="widget">
                <ul class="service-list">
                    <li>
                        <span class="icon blue">₩</span>
                        보험료 조회
                    </li>
                    <li>
                        <span class="icon gold">₩</span>
                        대출한도 조회
                    </li>
                </ul>
            </div>
        </aside>

    </div>
</div>
<div class="footer">
    ⓒ 2025 N카. All rights reserved.
</div>

</body>
</html>

<script>
    // === 메뉴 active 처리 ===
    document.addEventListener("DOMContentLoaded", () => {
      const path = window.location.pathname;
      document.querySelectorAll('.menu-left a, .menu-right a')
        .forEach(link => {
          if (link.getAttribute('data-path') === path) link.classList.add('active');
        });
    });

    // === 카드 전체 클릭: data-url로 이동 (하트 클릭은 제외) ===
    document.addEventListener('click', (e) => {
      // 하트 클릭이면 카드 네비게이션 무시
      if (e.target.closest('.wish-btn')) return;

      const card = e.target.closest('.encar-card');
      if (!card) return;

      const url = card.dataset.url || card.getAttribute('data-url');
      if (!url) return;

      // a나 버튼을 직접 눌렀으면 기본 동작 유지
      if (e.target.closest('a, button, input, select, textarea, label')) return;

      window.location.href = url;
    });

    // === CSRF 메타태그에서 읽어 헤더 생성 (Spring Security 사용 시) ===
    function csrfHeaders(base = {}) {
      const token  = document.querySelector('meta[name="_csrf"]')?.content;
      const header = document.querySelector('meta[name="_csrf_header"]')?.content;
      if (token && header) base[header] = token;
      return base;
    }

    // === 찜하기(하트) 토글 처리 ===
    let wishBusy = false; // 중복 클릭 방지

    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.wish-btn');
      if (!btn) return;

      // 디버깅 로그
      // console.log('✅ wish-btn clicked:', btn.dataset.carId);

      e.preventDefault();
      e.stopPropagation(); // 카드 네비게이션 차단

      if (wishBusy) return;
      wishBusy = true;

      const carId = Number(btn.dataset.carId);
      const prevOn = btn.classList.contains('on');

      // 낙관적 UI(즉시 토글) → 실패 시 롤백
      btn.classList.toggle('on', !prevOn);

      try {
        const res = await fetch('/api/wish/toggle', {
          method: 'POST',
          headers: csrfHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ carId })
        });

        if (res.status === 401) {
          btn.classList.toggle('on', prevOn); // 롤백
          alert('로그인이 필요합니다.');
          window.location.href = '/login';   // ✅ 로그인 페이지 이동
          return;
        }
        if (res.status === 403) {
          btn.classList.toggle('on', prevOn); // 롤백
          alert('요청이 거부되었어요(CSRF). 다시 로그인 후 시도해주세요.');
          window.location.href = '/login';   // ✅ CSRF 시에도 이동
          return;
        }
        if (res.status >= 500) {
          btn.classList.toggle('on', prevOn);
          const text = await res.text().catch(()=> '');
          console.error('SERVER-500:', text);
          alert('서버 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
          return;
        }
        const data = await res.json();
        if (!data.ok) {
          btn.classList.toggle('on', prevOn); // 롤백
          alert('처리 중 오류가 발생했습니다.');
        } else {
          // 서버 판단이 최종 상태
          btn.classList.toggle('on', !!data.liked);
        }
      } catch (err) {
        console.error(err);
        btn.classList.toggle('on', prevOn); // 롤백
        alert('네트워크 오류가 발생했습니다.');
      } finally {
        wishBusy = false;
      }
    });
</script>
