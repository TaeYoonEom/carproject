<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">

<head>
    <title>국산차 검색</title>

    <!-- ✅ base.html의 style fragment에 삽입됨 -->
    <link rel="stylesheet" href="/css/cate_gory.css" layout:fragment="style"/>
</head>

<body>
<div layout:fragment="content">

    <!-- === 기본 HTML 골격 === -->
    <div class="page-wrapper">
        <!-- 좌측 필터 영역 -->
        <aside class="sidebar-left">
            <div class="filter-header">
                <h4>국산차 검색</h4>
                <span class="allcount">
                대
                </span>
                선택초기화 최근검색조건
            </div>

            <!-- 차종 -->
            <details class="filter-group" open>
                <summary>차종</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 경차</label></li>
                    <li><label><input type="checkbox"> 소형차</label></li>
                    <li><label><input type="checkbox"> 준중형차</label></li>
                    <li><label><input type="checkbox"> 중형차</label></li>
                    <li><label><input type="checkbox"> 대형차</label></li>
                    <li><label><input type="checkbox"> 스포츠카</label></li>
                    <li><label><input type="checkbox"> SUV</label></li>
                    <li><label><input type="checkbox"> RV</label></li>
                    <li><label><input type="checkbox"> 경승합차</label></li>
                    <li><label><input type="checkbox"> 승합차</label></li>
                    <li><label><input type="checkbox"> 화물차</label></li>
                    <li><label><input type="checkbox"> 기타</label></li>
                </ul>
            </details>

            <!-- 제조사 / 모델 / 등급 -->
            <details class="filter-group">
                <summary>제조사 / 모델 / 등급</summary>
                <ul class="filter-list">
                    <label><input type="checkbox"> 현대</label>
                    <label><input type="checkbox"> 기아</label>
                    <label><input type="checkbox"> 제네시스</label>
                </ul>
            </details>

            <!-- 연식 -->
            <details class="filter-group">
                <summary>연식</summary>
                <ul class="filter-list">
                    <input type="number" placeholder="최소 연식"> ~
                    <input type="number" placeholder="최대 연식">
                </ul>
            </details>

            <!-- 주행거리 -->
            <details class="filter-group">
                <summary>주행거리</summary>
                <ul class="filter-list">
                    <input type="number" placeholder="최소 km"> ~
                    <input type="number" placeholder="최대 km">
                </ul>
            </details>

            <!-- 가격 -->
            <details class="filter-group">
                <summary>가격</summary>
                <ul class="filter-list">
                    <input type="number" placeholder="최소 만원"> ~
                    <input type="number" placeholder="최대 만원">
                </ul>
            </details>

            <!-- 지역 -->
            <details class="filter-group">
                <summary>지역</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 경기</label></li>
                    <li><label><input type="checkbox"> 대구</label></li>
                    <li><label><input type="checkbox"> 부산</label></li>
                    <li><label><input type="checkbox"> 서울</label></li>
                    <li><label><input type="checkbox"> 인천</label></li>
                </ul>
            </details>

            <!-- 인승 -->
            <details class="filter-group">
                <summary>인승</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 2인승 이하</label></li>
                    <li><label><input type="checkbox"> 3인승</label></li>
                    <li><label><input type="checkbox"> 4인승</label></li>
                    <li><label><input type="checkbox"> 5인승</label></li>
                    <li><label><input type="checkbox"> 6인승</label></li>
                    <li><label><input type="checkbox"> 7인승</label></li>
                    <li><label><input type="checkbox"> 8인승</label></li>
                    <li><label><input type="checkbox"> 9인승</label></li>
                    <li><label><input type="checkbox"> 10인승 이상</label></li>
                </ul>
            </details>

            <!-- 성능 / 보험 공개 -->
            <details class="filter-group">
                <summary>성능 / 보험 공개</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 엔카 직영 성능점검</label></li>
                    <li><label><input type="checkbox"> 성능기록부</label></li>
                    <li><label><input type="checkbox"> 보험이력</label></li>
                    <li><label><input type="checkbox"> 차량 이력 공개</label></li>
                </ul>
            </details>

            <!-- 판매자 구분 -->
            <details class="filter-group">
                <summary>판매자 구분</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 개인</label></li>
                    <li><label><input type="checkbox"> 딜러</label></li>
                    <li><label><input type="checkbox"> 리스렌트제휴</label></li>
                </ul>
            </details>

            <!-- 판매 방식 -->
            <details class="filter-group">
                <summary>판매 방식</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 일반</label></li>
                    <li><label><input type="checkbox"> 렌트</label></li>
                    <li><label><input type="checkbox"> 리스</label></li>
                </ul>
            </details>

            <!-- 외부 색상 -->
            <details class="filter-group">
                <summary>외부 색상</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 흰색</label></li>
                    <li><label><input type="checkbox"> 검정색</label></li>
                    <li><label><input type="checkbox"> 쥐색</label></li>
                    <li><label><input type="checkbox"> 청색</label></li>
                    <li><label><input type="checkbox"> 은색</label></li>
                </ul>
            </details>

            <!-- 내부 색상 -->
            <details class="filter-group">
                <summary>내부 색상</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 검정색 계열</label></li>
                    <li><label><input type="checkbox"> 갈색 계열</label></li>
                    <li><label><input type="checkbox"> 베이지색 계열</label></li>
                    <li><label><input type="checkbox"> 회색 계열</label></li>
                    <li><label><input type="checkbox"> 흰색 계열</label></li>
                </ul>
            </details>

            <!-- 연료 -->
            <details class="filter-group">
                <summary>연료</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 가솔린</label></li>
                    <li><label><input type="checkbox"> 디젤</label></li>
                    <li><label><input type="checkbox"> LPG(일반인 구입)</label></li>
                    <li><label><input type="checkbox"> LPG</label></li>
                    <li><label><input type="checkbox"> 가솔린+전기</label></li>
                    <li><label><input type="checkbox"> LPG+전기</label></li>
                    <li><label><input type="checkbox"> 가솔린+LPG</label></li>
                    <li><label><input type="checkbox"> 가솔린+CNG</label></li>
                    <li><label><input type="checkbox"> 전기</label></li>
                    <li><label><input type="checkbox"> 수소</label></li>
                    <li><label><input type="checkbox"> LNG</label></li>
                    <li><label><input type="checkbox"> CNG</label></li>
                </ul>
            </details>

            <!-- 변속기 -->
            <details class="filter-group">
                <summary>변속기</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 오토</label></li>
                    <li><label><input type="checkbox"> 수동</label></li>
                    <li><label><input type="checkbox"> 세미오토</label></li>
                    <li><label><input type="checkbox"> CVT</label></li>
                    <li><label><input type="checkbox"> 기타</label></li>
                </ul>
            </details>

            <!-- 옵션 -->
            <details class="filter-group">
                <summary>옵션</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 선푸르</label></li>
                    <li><label><input type="checkbox"> 내비게이션</label></li>
                    <li><label><input type="checkbox"> 스마트키</label></li>
                    <li><label><input type="checkbox"> 헤드램프(HID)</label></li>
                    <li><label><input type="checkbox"> 후방 카메라</label></li>
                    <li><label><input type="checkbox"> 가죽시트</label></li>
                    <li><label><input type="checkbox"> 에어백(동승석)</label></li>
                    <li><label><input type="checkbox"> 에어백(사이드)</label></li>
                </ul>
            </details>

            <!-- 차량번호 / 판매자 이름 -->
            <details class="filter-group">
                <summary>차량번호 / 판매자 이름</summary>
                <ul class="filter-list">
                    <input type="text" placeholder="차량번호 또는 이름 입력">
                </ul>
            </details>
        </aside>

        <!-- 가운데 차량 카드 영역 -->
        <main class="content">
            <div class="section-title">사진우대</div>
            <div class="encar-grid">
                <article class="encar-card"
                         th:each="car : ${carList.subList(0, 8)}"
                         th:with="cid=${car.car != null and car.car.carId != null ? car.car.carId : (car.carId != null ? car.carId : 0)}"
                         th:onclick="|location.href='/cars/${cid}'|"
                         style="cursor:pointer">

                    <!-- 차량 이미지 -->
                    <a th:href="@{'/cars/' + ${cid}}">
                        <img class="encar-img" th:src="@{${car.frontViewUrl}}" alt="차량 이미지">
                    </a>

                    <div class="encar-info">
                        <!-- 차량 제목 -->
                        <a class="encar-title"
                           th:href="@{'/cars/' + ${cid}}"
                           th:text="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량명')}">
                            차량명
                        </a>

                        <!-- 차량 정보: 연식 | 주행거리 | 구동방식 | 지역 -->
                        <div class="encar-category"
                             th:utext="${car.year} + '년 | ' + ${car.mileage} + 'km<br/>' + ${car.driveType} + ' | ' + ${car.saleLocation}">
                        </div>

                        <!-- 가격 (숫자 포맷 + 만원 단위) -->
                        <div class="encar-price"
                             th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'">
                        </div>
                    </div>
                </article>
            </div>

            <!-- 우대등록 영역 -->
            <div class="section-title">우대등록</div>
            <table class="premium-table">
                <thead>
                <tr>
                    <th>사진</th>
                    <th>차량정보</th>
                    <th>가격</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="car : ${carList}"
                    th:with="cid=${car.car != null && car.car.carId != null ? car.car.carId : (car.carId != null ? car.carId : 0)}">
                    <td>
                        <a class="cell-link" th:href="@{'/cars/' + ${cid}}">
                            <img class="thumb"
                                 th:src="@{${car.frontViewUrl}}"
                                 th:alt="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량 이미지')}">
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{'/cars/' + ${cid}}">
                            <div class="encar-title"
                                 th:text="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량명')}">차량명</div>
                            <div class="encar-category"
                                 th:text="${car.year} + '년 | ' + ${car.mileage} + 'km | ' + ${car.saleLocation}">정보</div>
                            <div class="encar-tag">
                                <span class="tag" th:if="${car.ownershipStatus == '소유중'}">무사고</span>
                                <span class="tag">1인소유</span>
                            </div>
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{'/cars/' + ${cid}}">
                          <span class="encar-price"
                                th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'">가격</span>
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>

            <!-- 일반등록 영역 -->
            <div class="section-title">일반등록</div>
            <table class="premium-table">
                <thead>
                <tr>
                    <th>사진</th>
                    <th>차량정보</th>
                    <th>가격</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="car : ${carList}"
                    th:with="cid=${car.car != null && car.car.carId != null ? car.car.carId : (car.carId != null ? car.carId : 0)}">
                    <td>
                        <a class="cell-link" th:href="@{'/cars/' + ${cid}}">
                            <img class="thumb"
                                 th:src="@{${car.frontViewUrl}}"
                                 th:alt="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량 이미지')}">
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{'/cars/' + ${cid}}">
                            <div class="encar-title"
                                 th:text="${car.car != null ? car.car.carName : (car.carName != null ? car.carName : '차량명')}">차량명</div>
                            <div class="encar-category"
                                 th:text="${car.year} + '년 | ' + ${car.mileage} + 'km | ' + ${car.saleLocation}">정보</div>
                            <div class="encar-tag">
                                <span class="tag" th:if="${car.ownershipStatus == '소유중'}">무사고</span>
                                <span class="tag">1인소유</span>
                            </div>
                        </a>
                    </td>
                    <td>
                        <a class="cell-link" th:href="@{'/cars/' + ${cid}}">
                          <span class="encar-price"
                                th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'">가격</span>
                        </a>
                    </td>
                </tr>
                </tbody>

            </table>
        </main>

        <!-- 📦 우측 배너 영역 -->
        <aside class="sidebar-right">
            <div class="widget">이차어때? 모카</div>
        </aside>
    </div>
</div>
<div class="footer">
    ⓒ 2025 N카. All rights reserved.
</div>

</body>
</html>

<script>
document.addEventListener("DOMContentLoaded", function () {
const path = window.location.pathname;
const links = document.querySelectorAll('.menu-left a, .menu-right a');
links.forEach(link => {
if (link.getAttribute('data-path') === path) {
link.classList.add('active');
}
});
});
</script>
