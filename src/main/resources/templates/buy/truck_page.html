<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">

<head>
    <title>화물특장버스검색</title>
    <!-- ✅ base.html의 style fragment에 삽입됨 -->
    <link rel="stylesheet" href="/css/cate_gory.css" layout:fragment="style"/>
</head>

<body>
<div layout:fragment="content">
    <div class="page-wrapper">
        <form id="truckFilterForm" method="get" th:action="@{/truck}">
            <!-- 좌측 필터 영역 -->
            <aside class="sidebar-left encar-filters">
                <div class="filter-header">
                    <div class="header-top">
                        <span class="label">화물특장버스 검색</span>
                    </div>
                    <div class="count-reset">
                        <span class="allcount">
                          <strong th:text="${#numbers.formatInteger(totalCount, 1, 'COMMA')}">0</strong>대
                        </span>
                        <button type="button" class="btn-reset" aria-label="선택 초기화">
                            <span class="ico-rotate" aria-hidden="true">↻</span>
                            선택 초기화
                        </button>
                    </div>
                    <div class="recent-search">
                        <button type="button" class="btn-recent">
                          <span class="ico-search" aria-hidden="true">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                              <circle cx="11" cy="11" r="7" stroke="#9aa1a7" stroke-width="2"/>
                              <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#9aa1a7" stroke-width="2" stroke-linecap="round"/>
                            </svg>
                          </span>
                            최근 검색 조건
                        </button>
                    </div>
                </div>

                <!-- 차종 -->
                <details class="filter-group" open>
                    <summary>형식/적재용량</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.bodyTypes}">
                            <label>
                                <input type="checkbox" name="bodyType" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.bodyType != null and filters.bodyType.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}">덤프</span>
                                <span class="count" th:text="${item.cnt}">0</span>
                            </label>
                        </li>
                    </ul>
                </details>
                <!-- ✅ 제조사 / 모델 / 세부모델(등급) -->
                <details class="filter-group">
                    <summary>제조사/모델/등급</summary>

                    <!-- ① 제조사 리스트 : 아무 제조사도 선택 안 된 상태 -->
                    <ul class="filter-list with-count maker-list"
                        th:if="${filterCounts['selectedMaker']} == null">
                        <li th:each="m : ${filterCounts.manufacturer}">
                            <label class="maker-label">
                                <input type="checkbox"
                                       name="manufacturer"
                                       th:value="${m.val}"
                                       th:disabled="${m.cnt == 0}"
                                       th:checked="${filters.manufacturer != null and filters.manufacturer.contains(m.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span class="text" th:text="${m.val}">현대</span>
                                <span class="count" th:text="${m.cnt}">0</span>
                            </label>
                        </li>
                    </ul>

                    <!-- ② 선택된 제조사의 모델 리스트 -->
                    <div class="filter-divider"
                         th:if="${filterCounts['selectedMaker']} != null"></div>

                    <div class="maker-facet"
                         th:if="${filterCounts['selectedMaker']} != null">
                        <div class="facet-section">

                            <!-- 상단 헤더: 제조사명 + X 버튼 -->
                            <div class="facet-maker-header">
                <span class="facet-title">
                    <span class="maker-name"
                          th:text="${filterCounts['selectedMaker']}">현대</span>
                </span>

                                <!-- 제조사 전체 해제 -->
                                <button type="button"
                                        class="btn-clear-maker"
                                        data-level="maker"
                                        aria-label="제조사 선택 해제">
                                    ×
                                </button>
                            </div>

                            <!-- 해당 제조사의 모델 리스트 -->
                            <ul class="filter-list with-count">
                                <li th:each="item : ${filterCounts.modelsForMaker}">
                                    <label>
                                        <input type="checkbox"
                                               name="modelName"
                                               th:value="${item.val}"
                                               th:disabled="${item.cnt == 0}"
                                               th:checked="${filters.modelName != null and filters.modelName.contains(item.val)}"
                                               onchange="document.getElementById('truckFilterForm').submit()">
                                        <span th:text="${item.val}">모델명</span>
                                        <span class="count" th:text="${item.cnt}">0</span>
                                    </label>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <!-- ③ 선택된 모델의 세부모델(등급) 리스트 -->
                    <div class="filter-divider"
                         th:if="${filterCounts['selectedMaker']} != null
                and ${filterCounts['selectedModel']} != null"></div>

                    <div class="maker-facet"
                         th:if="${filterCounts['selectedMaker']} != null
                and ${filterCounts['selectedModel']} != null">
                        <div class="facet-section">
                            <div class="facet-maker-header">
                <span class="facet-title">
                    <span class="maker-name"
                          th:text="${filterCounts['selectedModel']}">세부모델</span>
                </span>

                                <!-- 모델만 해제 (제조사는 유지) -->
                                <button type="button"
                                        class="btn-clear-maker"
                                        data-level="model"
                                        aria-label="모델 선택 해제">
                                    ×
                                </button>
                            </div>

                            <ul class="filter-list with-count">
                                <li th:each="g : ${filterCounts.carNamesForModel}">
                                    <label>
                                        <input type="checkbox"
                                               name="carName"
                                               th:value="${g.val}"
                                               th:disabled="${g.cnt == 0}"
                                               th:checked="${filters.carName != null and filters.carName.contains(g.val)}"
                                               onchange="document.getElementById('truckFilterForm').submit()">
                                        <span th:text="${g.val}">세부모델명</span>
                                        <span class="count" th:text="${g.cnt}">0</span>
                                    </label>
                                </li>
                            </ul>
                        </div>
                    </div>
                </details>

                <!-- 가변축 -->
                <details class="filter-group">
                    <summary>가변축</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.axleConfig}">
                            <label>
                                <input type="checkbox" name="axleConfig" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.axleConfig != null and filters.axleConfig.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <!-- 연식 -->
                <details class="filter-group">
                    <summary>연식</summary>
                    <div class="filter-range styled-range">
                        <div class="range-row">
                            <div class="selects">
                                <select id="yearFrom" name="yearFrom" class="styled-select" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">년</option>
                                </select>
                                <select id="monthFrom" name="monthFrom" class="styled-select" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">월</option>
                                </select>
                                <span class="suffix">부터</span>
                            </div>
                        </div>

                        <div class="range-row">
                            <div class="selects">
                                <select id="yearTo" name="yearTo" class="styled-select" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">년</option>
                                </select>
                                <select id="monthTo" name="monthTo" class="styled-select" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">월</option>
                                </select>
                                <span class="suffix">까지</span>
                            </div>
                        </div>
                    </div>
                </details>

                <!-- 주행거리 -->
                <details class="filter-group">
                    <summary>주행거리</summary>
                    <div class="filter-range styled-range">
                        <div class="range-row">
                            <div class="selects">
                                <select id="mileageFrom" name="mileageMin" class="styled-selected" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">선택</option>
                                </select>
                                <span class="suffix">부터</span>
                            </div>
                        </div>

                        <div class="range-row">
                            <div class="selects">
                                <select id="mileageTo" name="mileageMax" class="styled-selected" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">선택</option>
                                </select>
                                <span class="suffix">까지</span>
                            </div>
                        </div>
                    </div>
                </details>

                <!-- 가격 -->
                <details class="filter-group">
                    <summary>가격</summary>
                    <div class="filter-range styled-range">
                        <div class="range-row">
                            <div class="selects">
                                <select id="priceFrom" name="priceMin" class="styled-selected" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">선택</option>
                                </select>
                                <span class="suffix">부터</span>
                            </div>
                        </div>

                        <div class="range-row">
                            <div class="selects">
                                <select id="priceTo" name="priceMax" class="styled-selected" onchange="document.getElementById('truckFilterForm').submit()">
                                    <option value="">선택</option>
                                </select>
                                <span class="suffix">까지</span>
                            </div>
                        </div>

                        <button type="button" class="btn-interval">구간선택 열기</button>
                    </div>
                </details>

                <!-- 지역 -->
                <details class="filter-group">
                    <summary>지역</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.region}">
                            <label>
                                <input type="checkbox" name="region" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.region != null and filters.region.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <!-- 성능 공개 -->
                <details class="filter-group">
                    <summary>성능공개</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.performanceOpen}">
                            <label>
                                <input type="checkbox" name="performanceOpen" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.performanceOpen != null and filters.performanceOpen.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <!-- 판매자 구분 -->
                <details class="filter-group">
                    <summary>판매자 구분</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.sellerType}">
                            <label>
                                <input type="checkbox" name="sellerType" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.sellerType != null and filters.sellerType.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <!-- 용도 -->
                <details class="filter-group">
                    <summary>용도</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.usageType}">
                            <label>
                                <input type="checkbox" name="usageType" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.usageType != null and filters.usageType.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <!-- 색상 -->
                <details class="filter-group">
                    <summary>색상</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.color}">
                            <label>
                                <input type="checkbox" name="color" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.color != null and filters.color.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <details class="filter-group">
                    <summary>연료</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.fuelType}">
                            <label>
                                <input type="checkbox" name="fuelType" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.fuelType != null and filters.fuelType.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <!-- 변속기 -->
                <details class="filter-group">
                    <summary>변속기</summary>
                    <ul class="filter-list with-count">
                        <li th:each="item : ${filterCounts.transmission}">
                            <label>
                                <input type="checkbox" name="transmission" th:value="${item.val}" th:disabled="${item.cnt == 0}"
                                       th:checked="${filters.transmission != null and filters.transmission.contains(item.val)}"
                                       onchange="document.getElementById('truckFilterForm').submit()">
                                <span th:text="${item.val}"></span>
                                <span class="count" th:text="${item.cnt}"></span>
                            </label>
                        </li>
                    </ul>
                </details>

                <!-- 차량번호 / 판매자 이름 -->
                <details class="filter-group">
                    <summary>차량번호 / 판매자 이름</summary>
                    <ul class="filter-list with-count">
                        <input type="text" placeholder="차량번호 또는 이름 입력">
                    </ul>
                </details>
            </aside>

            <!-- 가운데 차량 카드 영역 -->
            <main class="content">
                <div class="section-title">사진우대</div>
                <div class="encar-grid">
                    <article class="encar-card"
                             th:each="card, stat : ${photoList}"
                             th:if="${stat.index} < 8"
                             th:with="cid=${card.carId}">
                        <!-- 하트 버튼 추가 -->
                        <button type="button"
                                class="wish-btn"
                                th:data-car-id="${cid}"
                                th:classappend="${wishSet != null and wishSet.contains(cid)} ? ' on' : ''"
                                aria-label="찜하기" title="찜하기">
                            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                                <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4 3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4 18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                      fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                        <img class="encar-img"
                             th:src="${card != null && card.frontViewUrl != null} ? ${card.frontViewUrl} : @{/img/default.jpg}"
                             alt="차량 이미지">

                        <div class="encar-info">
                            <div class="encar-title"
                                 th:text="${card.manufacturer} + ' ' + ${card.modelName}"></div>
                            <div class="encar-category"
                                 th:text="${card.year} + '년 ' + ${card.month} + '월 | ' + ${#numbers.formatInteger(card.mileage, 1, 'COMMA')} + 'km | ' + ${card.bodyType} + ' | ' + ${card.region}">
                            </div>
                            <div class="encar-price"
                                 th:text="${#numbers.formatInteger(card.price/10000, 1, 'COMMA')} + '만원'"></div>
                        </div>
                    </article>

                </div>
                <!-- 우대등록 -->
                <div class="section-title">우대등록</div>
                <table class="premium-table">
                    <thead>
                    <tr><th>사진</th><th>차량정보</th><th>가격</th></tr>
                    </thead>
                    <tbody id="premium-body">
                    <tr th:each="card, stat : ${premiumList}"
                        th:if="${stat.index} < 8"
                        th:with="cid=${card.carId}">

                        <td class="thumb-cell">
                            <!-- 하트 버튼 -->
                            <button type="button"
                                    class="wish-btn small"
                                    th:data-car-id="${cid}"
                                    th:classappend="${wishSet != null and wishSet.contains(cid)} ? ' on' : ''">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4
                                            3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4
                                            18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                          fill="none" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>

                            <img class="thumb"
                                 th:src="${card.frontViewUrl != null} ? ${card.frontViewUrl} : '@{/img/default_thumb.jpg}'">
                        </td>
                        <td>
                            <div class="encar-title" th:text="${card.manufacturer} + ' ' + ${card.modelName}">차량명</div>
                            <div class="encar-category"
                                 th:text="${card.year} + '년 | ' + ${#numbers.formatInteger(card.mileage,1,'COMMA')} + 'km | ' + ${card.region}">
                            </div>

                        </td>
                        <td class="encar-price"
                            th:text="${#numbers.formatInteger(card.price/10000,1,'COMMA')} + '만원'">가격</td>
                    </tr>
                    </tbody>
                </table>

                <!-- 일반등록 -->
                <div class="section-title">일반등록
                    <div class="list-header">
                        <div class="sort-options">
                            <a href="#" data-sort="recent"      th:classappend="${sort}=='recent' ? 'active' : ''">최근 등록일순</a>
                            <a href="#" data-sort="priceAsc"    th:classappend="${sort}=='priceAsc' ? 'active' : ''">낮은 가격순</a>
                            <a href="#" data-sort="priceDesc"   th:classappend="${sort}=='priceDesc' ? 'active' : ''">높은 가격순</a>
                            <a href="#" data-sort="mileageAsc"  th:classappend="${sort}=='mileageAsc' ? 'active' : ''">낮은 주행거리순</a>
                            <a href="#" data-sort="mileageDesc" th:classappend="${sort}=='mileageDesc' ? 'active' : ''">높은 주행거리순</a>
                            <a href="#" data-sort="yearDesc"    th:classappend="${sort}=='yearDesc' ? 'active' : ''">최근연식순</a>

                            <!-- 오른쪽 select (정렬바 내부에서 오른쪽 끝으로 자동 정렬됨) -->
                            <select id="pageSizeSelect" name="size" class="page-size-select">
                                <option value="10" th:selected="${size==10}">10개씩</option>
                                <option value="20" th:selected="${size==20}">20개씩</option>
                                <option value="30" th:selected="${size==30}">30개씩</option>
                                <option value="40" th:selected="${size==40}">40개씩</option>
                                <option value="50" th:selected="${size==50}">50개씩</option>
                            </select>
                        </div>
                    </div>
                </div>
                <table class="premium-table">
                    <thead>
                    <tr><th>사진</th><th>차량정보</th><th>가격</th></tr>
                    </thead>
                    <tbody id="normal-body">
                    <tr th:each="card : ${carList}"
                        th:with="cid=${card.carId}">
                        <td class="thumb-cell">

                            <!-- 하트 버튼 -->
                            <button type="button"
                                    class="wish-btn small"
                                    th:data-car-id="${cid}"
                                    th:classappend="${wishSet != null and wishSet.contains(cid)} ? ' on' : ''">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4
                                            3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4
                                            18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                          fill="none" stroke="currentColor" stroke-width="2"/>
                                </svg>
                            </button>

                            <img class="thumb"
                                 th:src="${card.frontViewUrl != null} ? ${card.frontViewUrl} : '@{/img/default_thumb.jpg}'">

                        <td>
                            <div class="encar-title" th:text="${card.manufacturer} + ' ' + ${card.modelName}">차량명</div>
                            <div class="encar-category"
                                 th:text="${card.year} + '년 | ' + ${#numbers.formatInteger(card.mileage,1,'COMMA')} + 'km | ' + ${card.region}">
                            </div>
                        </td>
                        <td class="encar-price"
                            th:text="${#numbers.formatInteger(card.price/10000,1,'COMMA')} + '만원'">가격</td>
                    </tr>
                    </tbody>
                </table>
                <div class="pagination">
                    <ul class="encar-pagination">
                        <li th:classappend="${page.hasPrevious()} ? '' : 'disabled'">
                            <a href="#" th:data-page="${page.number - 1}">이전</a>
                        </li>

                        <li th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                            th:classappend="${i == page.number} ? 'active'">
                            <a href="#" th:text="${i + 1}" th:data-page="${i}"></a>
                        </li>

                        <li th:classappend="${page.hasNext()} ? '' : 'disabled'">
                            <a href="#" th:data-page="${page.number + 1}">다음</a>
                        </li>
                    </ul>
                </div>
                <input type="hidden" name="sort" th:value="${sort}"/>
                <input type="hidden" name="page" th:value="${page.number}"/>
            </main>
        </form>

        <!-- 📦 우측 배너 영역 -->
        <aside class="sidebar-right">
            <div class="widget">

                            보험료 조회
                        </a>
                    </li>

                    <li>
                        <a href="https://www.hyundaicapital.com" target="_blank" style="text-decoration: none; color: inherit;">
                            <span class="icon gold">₩</span>
                            대출한도 조회
                        </a>

                </ul>
            </div>
        </aside>
    </div>

<th:block layout:fragment="script">
    <script defer src="/js/base.js"></script>
    <script defer src="/js/wishlist.js"></script>
    <script defer src="/js/filter_init.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const form      = document.getElementById("truckFilterForm");
            const sortInput = form.querySelector("input[name='sort']");
            const pageInput = form.querySelector("input[name='page']");
            const sizeSelect = document.getElementById("pageSizeSelect");

            // ✔ 정렬 변경
            document.querySelectorAll(".sort-options a").forEach(a => {
                a.addEventListener("click", function (e) {
                    e.preventDefault();
                    sortInput.value = this.dataset.sort;
                    pageInput.value = 0;
                    form.submit();
                });
            });

            // ✔ 페이지 크기 변경
            sizeSelect?.addEventListener("change", () => {
                pageInput.value = 0;
                form.submit();
            });

            // ✔ 페이지네이션
            document.querySelectorAll(".pagination a[data-page]").forEach(a => {
                a.addEventListener("click", function (e) {
                    e.preventDefault();
                    const p = this.dataset.page;
                    if (this.parentElement.classList.contains("disabled")) return;

                    pageInput.value = p;
                    form.submit();
                });
            });

            // ✔ 선택 초기화
            const resetBtn = document.querySelector(".btn-reset");
            resetBtn.addEventListener("click", () => {
                document.querySelectorAll(".encar-filters input[type='checkbox']").forEach(el => el.checked = false);
                document.querySelectorAll(".encar-filters select").forEach(el => el.selectedIndex = 0);

                sortInput.value = "recent";
                pageInput.value = 0;
                form.submit();
            });
            // ✅ 제조사/모델 X 버튼 (계단식 필터 초기화)
            document.querySelectorAll(".btn-clear-maker").forEach(btn => {
                btn.addEventListener("click", function () {
                    const level = this.dataset.level;

                    if (level === "maker") {
                        // 제조사 + 모델 + 세부모델 전체 해제
                        document.querySelectorAll("input[name='manufacturer']").forEach(el => el.checked = false);
                        document.querySelectorAll("input[name='modelName']").forEach(el => el.checked = false);
                        document.querySelectorAll("input[name='carName']").forEach(el => el.checked = false);
                    } else if (level === "model") {
                        // 모델 + 세부모델만 해제 (제조사는 유지)
                        document.querySelectorAll("input[name='modelName']").forEach(el => el.checked = false);
                        document.querySelectorAll("input[name='carName']").forEach(el => el.checked = false);
                    }

                    const form = document.getElementById("truckFilterForm");
                    const pageInput = form.querySelector("input[name='page']");
                    pageInput.value = 0;
                    form.submit();
                });
            });

        });
    </script>
</th:block>
</body>
</html>
