<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">

<head>
    <title>화물특장버스검색</title>
    <!-- ✅ base.html의 style fragment에 삽입됨 -->
    <link rel="stylesheet" href="/css/cate_gory.css" layout:fragment="style"/>
</head>

<body>
<div layout:fragment="content">

    <!-- === 기본 HTML 골격 === -->
    <div class="page-wrapper">
        <!-- 좌측 필터 영역 -->
        <aside class="sidebar-left encar-filters">
            <div class="filter-header">
                <div class="header-top">
                    <span class="label">화물특장버스 검색</span>
                </div>
                <div class="count-reset">
                    <span class="allcount">
                      <strong th:text="${#numbers.formatInteger(totalCount, 1, 'COMMA')}">0</strong>대
                    </span>
                    <button type="button" class="btn-reset" aria-label="선택 초기화">
                        <span class="ico-rotate" aria-hidden="true">↻</span>
                        선택 초기화
                    </button>
                </div>
                <div class="recent-search">
                    <button type="button" class="btn-recent">
                      <span class="ico-search" aria-hidden="true">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                          <circle cx="11" cy="11" r="7" stroke="#9aa1a7" stroke-width="2"/>
                          <line x1="16.5" y1="16.5" x2="21" y2="21" stroke="#9aa1a7" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                      </span>
                        최근 검색 조건
                    </button>
                </div>
            </div>

            <!-- 차종 -->
            <details class="filter-group" open>
                <summary>형식/적재용량</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.bodyTypes}">
                        <label>
                            <input type="checkbox" name="bodyType" th:value="${item.val}">
                            <span th:text="${item.val}">덤프</span>
                            <span class="count" th:text="${item.cnt}">0</span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 제조사 / 모델 / 등급 -->
            <details class="filter-group">
                <summary>제조사</summary>
                <ul class="filter-list" id="maker-box">
                    <li th:each="m : ${filters.manufacturer}">
                        <label>
                            <input type="checkbox"
                                   name="manufacturer"
                                   onclick="loadModels(this.value)"
                                   th:value="${m.val}">
                            <span th:text="${m.val}">현대</span>
                            <span class="count" th:text="${m.cnt}">0</span>
                        </label>
                    </li>
                </ul>
            </details>
            <details class="filter-group">
                <summary>모델</summary>
                <ul id="model-box" class="filter-list">
                    <li th:each="item : ${filters.modelName}">
                        <label>
                            <input type="checkbox"
                                   name="modelName"
                                   onclick="loadCarNames(item.value)"
                                   th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 🔥 세부모델(carName) 필터 -->
            <details class="filter-group">
                <summary>세부모델</summary>
                <ul id="carname-box" class="filter-list">
                    <!-- 여기에 fetch로 불러온 세부모델이 들어감 -->
                </ul>
            </details>


            <!-- 가변축 -->
            <details class="filter-group">
                <summary>가변축</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.axleConfig}">
                        <label>
                            <input type="checkbox" name="axleConfig" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 연식 -->
            <details class="filter-group">
                <summary>연식</summary>
                <div class="filter-range styled-range">
                    <div class="range-row">
                        <div class="selects">
                            <select id="yearFrom" class="styled-select">
                                <option value="">년</option>
                            </select>
                            <select id="monthFrom" class="styled-select">
                                <option value="">월</option>
                            </select>
                            <span class="suffix">부터</span>
                        </div>
                    </div>

                    <div class="range-row">
                        <div class="selects">
                            <select id="yearTo" class="styled-select">
                                <option value="">년</option>
                            </select>
                            <select id="monthTo" class="styled-select">
                                <option value="">월</option>
                            </select>
                            <span class="suffix">까지</span>
                        </div>
                    </div>
                </div>
            </details>

            <!-- 주행거리 -->
            <details class="filter-group">
                <summary>주행거리</summary>
                <div class="filter-range styled-range">
                    <div class="range-row">
                        <div class="selects">
                            <select id="mileageFrom" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">부터</span>
                        </div>
                    </div>

                    <div class="range-row">
                        <div class="selects">
                            <select id="mileageTo" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">까지</span>
                        </div>
                    </div>
                </div>
            </details>

            <!-- 가격 -->
            <details class="filter-group">
                <summary>가격</summary>
                <div class="filter-range styled-range">
                    <div class="range-row">
                        <div class="selects">
                            <select id="priceFrom" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">부터</span>
                        </div>
                    </div>

                    <div class="range-row">
                        <div class="selects">
                            <select id="priceTo" class="styled-selected">
                                <option value="">선택</option>
                            </select>
                            <span class="suffix">까지</span>
                        </div>
                    </div>

                    <button type="button" class="btn-interval">구간선택 열기</button>
                </div>
            </details>

            <!-- 지역 -->
            <details class="filter-group">
                <summary>지역</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.region}">
                        <label>
                            <input type="checkbox" name="region" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 성능 공개 -->
            <details class="filter-group">
                <summary>성능공개</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.performanceOpen}">
                        <label>
                            <input type="checkbox" name="performanceOpen" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 판매자 구분 -->
            <details class="filter-group">
                <summary>판매자 구분</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.sellerType}">
                        <label>
                            <input type="checkbox" name="sellerType" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 용도 -->
            <details class="filter-group">
                <summary>용도</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.usageType}">
                        <label>
                            <input type="checkbox" name="usageType" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 색상 -->
            <details class="filter-group">
                <summary>색상</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.color}">
                        <label>
                            <input type="checkbox" name="color" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <details class="filter-group">
                <summary>연료</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.fuelType}">
                        <label>
                            <input type="checkbox" name="fuelType" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 변속기 -->
            <details class="filter-group">
                <summary>변속기</summary>
                <ul class="filter-list">
                    <li th:each="item : ${filters.transmission}">
                        <label>
                            <input type="checkbox" name="transmission" th:value="${item.val}">
                            <span th:text="${item.val}"></span>
                            <span class="count" th:text="${item.cnt}"></span>
                        </label>
                    </li>
                </ul>
            </details>

            <!-- 옵션 -->
            <details class="filter-group">
                <summary>옵션</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 선푸르</label></li>
                    <li><label><input type="checkbox"> 내비게이션</label></li>
                    <li><label><input type="checkbox"> 스마트키</label></li>
                    <li><label><input type="checkbox"> 헤드램프(HID)</label></li>
                    <li><label><input type="checkbox"> 후방 카메라</label></li>
                    <li><label><input type="checkbox"> 가죽시트</label></li>
                    <li><label><input type="checkbox"> 에어백(동승석)</label></li>
                    <li><label><input type="checkbox"> 에어백(사이드)</label></li>
                </ul>
            </details>

            <!-- 차량번호 / 판매자 이름 -->
            <details class="filter-group">
                <summary>차량번호 / 판매자 이름</summary>
                <ul class="filter-list">
                    <input type="text" placeholder="차량번호 또는 이름 입력">
                </ul>
            </details>
        </aside>

        <!-- 가운데 차량 카드 영역 -->
        <main class="content">
            <div class="section-title">사진우대</div>
            <div class="encar-grid">
                <article class="encar-card"
                         th:each="card, stat : ${truckCards}"
                         th:if="${stat.index} < 8"
                         th:with="cid=${card.carId}">
                    <!-- 하트 버튼 추가 -->
                    <button type="button"
                            class="wish-btn"
                            th:data-car-id="${cid}"
                            th:classappend="${wishSet != null and wishSet.contains(cid)} ? ' on' : ''"
                            aria-label="찜하기" title="찜하기">
                        <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                            <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4 3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4 18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                  fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <img class="encar-img"
                         th:src="${card != null && card.frontViewUrl != null} ? ${card.frontViewUrl} : @{/img/default.jpg}"
                         alt="차량 이미지">

                    <div class="encar-info">
                        <div class="encar-title"
                             th:text="${card.manufacturer} + ' ' + ${card.modelName}"></div>
                        <div class="encar-category"
                             th:text="${card.year} + '년 ' + ${card.month} + '월 | ' + ${#numbers.formatInteger(card.mileage, 1, 'COMMA')} + 'km | ' + ${card.bodyType} + ' | ' + ${card.region}">
                        </div>
                        <div class="encar-price"
                             th:text="${#numbers.formatInteger(card.price/10000, 1, 'COMMA')} + '만원'"></div>
                    </div>
                </article>

            </div>
            <!-- 우대등록 -->
            <div class="section-title">우대등록</div>
            <table class="premium-table">
                <thead>
                <tr><th>사진</th><th>차량정보</th><th>가격</th></tr>
                </thead>
                <tbody id="premium-body">
                <tr th:each="card, stat : ${truckCards}"
                    th:if="${stat.index} < 8"
                    th:with="cid=${card.carId}">

                    <td class="thumb-cell">
                        <!-- 하트 버튼 -->
                        <button type="button"
                                class="wish-btn small"
                                th:data-car-id="${cid}"
                                th:classappend="${wishSet != null and wishSet.contains(cid)} ? ' on' : ''">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4
                                        3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4
                                        18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                      fill="none" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </button>

                        <img class="thumb"
                             th:src="${card.frontViewUrl != null} ? ${card.frontViewUrl} : '@{/img/default_thumb.jpg}'">
                    </td>
                    <td>
                        <div class="encar-title" th:text="${card.manufacturer} + ' ' + ${card.modelName}">차량명</div>
                        <div class="encar-category"
                             th:text="${card.year} + '년 | ' + ${#numbers.formatInteger(card.mileage,1,'COMMA')} + 'km | ' + ${card.region}">
                        </div>

                    </td>
                    <td class="encar-price"
                        th:text="${#numbers.formatInteger(card.price/10000,1,'COMMA')} + '만원'">가격</td>
                </tr>
                </tbody>
            </table>

            <!-- 일반등록 -->
            <div class="section-title">일반등록
                <div class="list-header">
                    <div class="sort-options">
                        <a th:href="@{/cars(sort='recent')}"      th:classappend="${sort == 'recent'} ? 'active' : ''">최근 등록일순</a>
                        <a th:href="@{/cars(sort='priceAsc')}"    th:classappend="${sort == 'priceAsc'} ? 'active' : ''">낮은 가격순</a>
                        <a th:href="@{/cars(sort='priceDesc')}"   th:classappend="${sort == 'priceDesc'} ? 'active' : ''">높은 가격순</a>
                        <a th:href="@{/cars(sort='mileageAsc')}"  th:classappend="${sort == 'mileageAsc'} ? 'active' : ''">낮은 주행거리순</a>
                        <a th:href="@{/cars(sort='mileageDesc')}" th:classappend="${sort == 'mileageDesc'} ? 'active' : ''">높은 주행거리순</a>
                        <a th:href="@{/cars(sort='yearDesc')}"    th:classappend="${sort == 'yearDesc'} ? 'active' : ''">최근연식순</a>
                    </div>

                    <div class="page-size">
                        <select onchange="location.href=this.value">
                            <option th:value="@{/cars(pageSize=20)}"  th:selected="${pageSize==20}">20개씩 보기</option>
                            <option th:value="@{/cars(pageSize=50)}"  th:selected="${pageSize==50}">50개씩 보기</option>
                            <option th:value="@{/cars(pageSize=100)}" th:selected="${pageSize==100}">100개씩 보기</option>
                        </select>
                    </div>
                </div>
            </div>
            <table class="premium-table">
                <thead>
                <tr><th>사진</th><th>차량정보</th><th>가격</th></tr>
                </thead>
                <tbody id="normal-body">
                <tr th:each="card : ${truckCards}"
                    th:with="cid=${card.carId}">
                    <td class="thumb-cell">

                        <!-- 하트 버튼 -->
                        <button type="button"
                                class="wish-btn small"
                                th:data-car-id="${cid}"
                                th:classappend="${wishSet != null and wishSet.contains(cid)} ? ' on' : ''">
                            <svg viewBox="0 0 24 24" width="20" height="20">
                                <path d="M12 21c-.3 0-.6-.1-.8-.3C9 19 3 14.6 3 9.4
                                        3 6.5 5.3 4 8.1 4c1.6 0 3.1.8 3.9 2.1C12.8 4.8 14.3 4 15.9 4
                                        18.7 4 21 6.5 21 9.4c0 5.2-6 9.6-8.2 11.3-.2.2-.5.3-.8.3z"
                                      fill="none" stroke="currentColor" stroke-width="2"/>
                            </svg>
                        </button>

                        <img class="thumb"
                             th:src="${card.frontViewUrl != null} ? ${card.frontViewUrl} : '@{/img/default_thumb.jpg}'">

                    <td>
                        <div class="encar-title" th:text="${card.manufacturer} + ' ' + ${card.modelName}">차량명</div>
                        <div class="encar-category"
                             th:text="${card.year} + '년 | ' + ${#numbers.formatInteger(card.mileage,1,'COMMA')} + 'km | ' + ${card.region}">
                        </div>
                    </td>
                    <td class="encar-price"
                        th:text="${#numbers.formatInteger(card.price/10000,1,'COMMA')} + '만원'">가격</td>
                </tr>
                </tbody>
            </table>
        </main>

        <!-- 📦 우측 배너 영역 -->
        <aside class="sidebar-right">
            <div class="widget">
                <ul class="service-list">
                    <li>
                        <span class="icon blue">₩</span>
                        보험료 조회
                    </li>
                    <li>
                        <span class="icon gold">₩</span>
                        대출한도 조회
                    </li>
                </ul>
            </div>
        </aside>
    </div>
</div>
<div class="footer">
    ⓒ 2025 N카. All rights reserved.
</div>
<th:block layout:fragment="script">
    <script defer src="/js/base.js"></script>
    <script defer src="/js/wishlist.js"></script>
    <script defer src="/js/truck_filter_init.js"></script>
    <script defer src="/js/truck_filter.js"></script>
</th:block>
</body>
</html>
<script>
    function loadModels(maker) {
        fetch(`/truck/filters?maker=` + maker)
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById("model-box");
                box.innerHTML = "";
                data.modelName.forEach(item => {
                    box.innerHTML += `
                        <li>
                            <label>
                                <input type="checkbox"
                                       onclick="loadCarNames('${item.val}')"
                                       value="${item.val}">
                                ${item.val}
                                <span class="count">${item.cnt}</span>
                            </label>
                        </li>
                    `;
                });
            });
    }

    function loadCarNames(model) {
        fetch(`/truck/filters?model=` + model)
            .then(res => res.json())
            .then(data => {
                const box = document.getElementById("carname-box");
                box.innerHTML = "";
                data.carName.forEach(item => {
                    box.innerHTML += `
                        <li>
                            <label>
                                <input type="checkbox" value="${item.val}">
                                ${item.val}
                                <span class="count">${item.cnt}</span>
                            </label>
                        </li>
                    `;
                });
            });
    }

</script>
