<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="ko"
      layout:decorate="~{base}">

<head>
    <title>화물특장버스검색</title>
    <!-- ✅ base.html의 style fragment에 삽입됨 -->
    <link rel="stylesheet" href="/css/cate_gory.css" layout:fragment="style"/>
</head>

<body>
<div layout:fragment="content">

    <!-- === 기본 HTML 골격 === -->
    <div class="page-wrapper">
        <!-- 좌측 필터 영역 -->
        <aside class="sidebar-left encar-filters">
            <div class="filter-header">
                <div class="header-top">
                    <span class="label">화물특장버스 검색</span>
                </div>
                <div class="count-reset">
                    <span class="allcount">
                      <strong th:text="${#numbers.formatInteger(totalCount, 1, 'COMMA')}">0</strong>대
                    </span>
                    <button type="button" class="btn-reset" aria-label="선택 초기화">
                        <span class="ico-rotate" aria-hidden="true">↻</span>
                        선택 초기화
                    </button>
                </div>
            </div>

            <!-- 차종 -->
            <details class="filter-group" open>
                <summary>형식/적재용량</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 경차</label></li>
                    <li><label><input type="checkbox"> 소형차</label></li>
                    <li><label><input type="checkbox"> 준중형차</label></li>
                    <li><label><input type="checkbox"> 중형차</label></li>
                    <li><label><input type="checkbox"> 대형차</label></li>
                    <li><label><input type="checkbox"> 스포츠카</label></li>
                    <li><label><input type="checkbox"> SUV</label></li>
                    <li><label><input type="checkbox"> RV</label></li>
                    <li><label><input type="checkbox"> 경승합차</label></li>
                    <li><label><input type="checkbox"> 승합차</label></li>
                    <li><label><input type="checkbox"> 화물차</label></li>
                    <li><label><input type="checkbox"> 기타</label></li>
                </ul>
            </details>

            <!-- 제조사 / 모델 / 등급 -->
            <details class="filter-group">
                <summary>제조사 / 모델 / 등급</summary>
                <ul class="filter-list">
                    <label><input type="checkbox"> 현대</label>
                    <label><input type="checkbox"> 기아</label>
                    <label><input type="checkbox"> 제네시스</label>
                </ul>
            </details>

            <!-- 가변축 -->
            <details class="filter-group">
                <summary>가변축</summary>
                <ul class="filter-list">
                    <label><input type="checkbox"> 전축</label>
                    <label><input type="checkbox"> 중축</label>
                    <label><input type="checkbox"> 후축</label>
                </ul>
            </details>

            <!-- 연식 -->
            <details class="filter-group" open>
                <summary>연식</summary>
                <div class="filter-list" style="display: flex; flex-direction: column; gap: 8px;">
                    <!-- 시작 연월 -->
                    <div>
                        <select name="start_year">
                            <option>년</option>
                            <option>2025년</option>
                            <option>2024년</option>
                            <option>2023년</option>
                            <option>2022년</option>
                            <option>2021년</option>
                            <option>2020년</option>
                            <option>2019년</option>
                            <option>2018년</option>
                            <option>2017년</option>
                            <option>2016년</option>
                            <option>2015년</option>
                            <option>2014년</option>
                            <option>2013년</option>
                            <option>2012년</option>
                            <option>2011년</option>
                        </select>
                        <select name="start_month">
                            <option>월</option>
                            <option>1월</option>
                            <option>2월</option>
                            <option>3월</option>
                            <option>4월</option>
                            <option>5월</option>
                            <option>6월</option>
                            <option>7월</option>
                            <option>8월</option>
                            <option>9월</option>
                            <option>10월</option>
                            <option>11월</option>
                            <option>12월</option>
                        </select>
                        <span>부터</span>
                    </div>

                    <!-- 종료 연월 -->
                    <div>
                        <select name="end_year">
                            <option>년</option>
                            <option>2025년</option>
                            <option>2024년</option>
                            <option>2023년</option>
                            <option>2022년</option>
                            <option>2021년</option>
                            <option>2020년</option>
                            <option>2019년</option>
                            <option>2018년</option>
                            <option>2017년</option>
                            <option>2016년</option>
                            <option>2015년</option>
                            <option>2014년</option>
                            <option>2013년</option>
                            <option>2012년</option>
                            <option>2011년</option>
                        </select>
                        <select name="end_month">
                            <option>월</option>
                            <option>1월</option>
                            <option>2월</option>
                            <option>3월</option>
                            <option>4월</option>
                            <option>5월</option>
                            <option>6월</option>
                            <option>7월</option>
                            <option>8월</option>
                            <option>9월</option>
                            <option>10월</option>
                            <option>11월</option>
                            <option>12월</option>
                        </select>
                        <span>까지</span>
                    </div>
                </div>
            </details>

            <!-- 주행거리 -->
            <details class="filter-group">
                <summary>주행거리</summary>
                <ul class="filter-list">
                    <input type="number" placeholder="최소 km"> ~
                    <input type="number" placeholder="최대 km">
                </ul>
            </details>

            <!-- 가격 -->
            <details class="filter-group">
                <summary>가격</summary>
                <ul class="filter-list">
                    <input type="number" placeholder="최소 만원"> ~
                    <input type="number" placeholder="최대 만원">
                </ul>
            </details>

            <!-- 엔카진단 -->
            <details class="filter-group">
                <summary>엔카진단</summary>
                <ul class="filter-list">
                    <label><input type="checkbox"> 엔카진단</label>
                </ul>
            </details>

            <!-- 지역 -->
            <details class="filter-group">
                <summary>지역</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 경기</label></li>
                    <li><label><input type="checkbox"> 대구</label></li>
                    <li><label><input type="checkbox"> 부산</label></li>
                    <li><label><input type="checkbox"> 서울</label></li>
                    <li><label><input type="checkbox"> 인천</label></li>
                </ul>
            </details>

            <!-- 성능 공개 -->
            <details class="filter-group">
                <summary>성능공개</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 엔카 직영 성능점검</label></li>
                    <li><label><input type="checkbox"> 성능기록부</label></li>
                </ul>
            </details>

            <!-- 판매자 구분 -->
            <details class="filter-group">
                <summary>판매자 구분</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 개인</label></li>
                    <li><label><input type="checkbox"> 딜러</label></li>
                </ul>
            </details>

            <!-- 판매 방식 -->
            <details class="filter-group">
                <summary>판매 방식</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 일반</label></li>
                    <li><label><input type="checkbox"> 렌트</label></li>
                    <li><label><input type="checkbox"> 리스</label></li>
                </ul>
            </details>

            <!-- 용도 -->
            <details class="filter-group">
                <summary>용도</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 자가용</label></li>
                    <li><label><input type="checkbox"> 영업용</label></li>
                    <li><label><input type="checkbox"> 등본차량</label></li>
                </ul>
            </details>

            <!-- 색상 -->
            <details class="filter-group">
                <summary>색상</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 흰색</label></li>
                    <li><label><input type="checkbox"> 검정색</label></li>
                    <li><label><input type="checkbox"> 쥐색</label></li>
                    <li><label><input type="checkbox"> 청색</label></li>
                    <li><label><input type="checkbox"> 은색</label></li>
                </ul>
            </details>

            <details class="filter-group">
                <summary>연료</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 가솔린</label></li>
                    <li><label><input type="checkbox"> 디젤</label></li>
                    <li><label><input type="checkbox"> LPG(일반인 구입)</label></li>
                    <li><label><input type="checkbox"> 전기</label></li>
                    <li><label><input type="checkbox"> CNG</label></li>
                    <li><label><input type="checkbox"> 기타</label></li>
                </ul>
            </details>

            <!-- 변속기 -->
            <details class="filter-group">
                <summary>변속기</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 오토</label></li>
                    <li><label><input type="checkbox"> 수동</label></li>
                    <li><label><input type="checkbox"> 세미오토</label></li>
                    <li><label><input type="checkbox"> 기타</label></li>
                </ul>
            </details>

            <!-- 옵션 -->
            <details class="filter-group">
                <summary>옵션</summary>
                <ul class="filter-list">
                    <li><label><input type="checkbox"> 선푸르</label></li>
                    <li><label><input type="checkbox"> 내비게이션</label></li>
                    <li><label><input type="checkbox"> 스마트키</label></li>
                    <li><label><input type="checkbox"> 헤드램프(HID)</label></li>
                    <li><label><input type="checkbox"> 후방 카메라</label></li>
                    <li><label><input type="checkbox"> 가죽시트</label></li>
                    <li><label><input type="checkbox"> 에어백(동승석)</label></li>
                    <li><label><input type="checkbox"> 에어백(사이드)</label></li>
                </ul>
            </details>

            <!-- 차량번호 / 판매자 이름 -->
            <details class="filter-group">
                <summary>차량번호 / 판매자 이름</summary>
                <ul class="filter-list">
                    <input type="text" placeholder="차량번호 또는 이름 입력">
                </ul>
            </details>
        </aside>

        <!-- 가운데 차량 카드 영역 -->
        <main class="content">
            <div class="section-title">사진우대</div>
            <div class="encar-grid">
                <article class="encar-card" th:each="card : ${cargoCards}">
                    <img class="encar-img"
                         th:src="${card.frontViewUrl != null} ? ${card.frontViewUrl} : '@{/img/default.jpg}'"
                         alt="차량 이미지"/>

                    <div class="encar-info">
                        <div class="encar-title"
                             th:text="${card.manufacturer} + ' ' + ${card.modelName}">
                            제조사 모델
                        </div>

                        <div class="encar-category"
                             th:text="${card.year} + '년 ' + ${card.month} + '월 | ' + ${#numbers.formatInteger(card.mileage, 1, 'COMMA')} + 'km | ' + ${card.bodyType} + ' | ' + ${card.region}">
                            2022년 5월 | 50,000km | 카고 | 경기
                        </div>

                        <div class="encar-price"
                             th:text="${#numbers.formatInteger(card.price/10000, 1, 'COMMA')} + '만원'">
                            0만원
                        </div>
                    </div>
                </article>
            </div>



            <!-- 우대등록 영역 -->
            <div class="section-title">우대등록</div>
            <table class="premium-table">
                <thead>
                <tr>
                    <th>사진</th>
                    <th>차량정보</th>
                    <th>가격</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="car : ${carList}">
                    <td><img class="thumb" th:src="@{'/img/' + ${car.carName} + '.jpg'}" th:alt="${car.carName}"></td>
                    <td>
                        <div class="encar-title" th:text="${car.carName}">차량명</div>
                        <div class="encar-category"
                             th:text="${car.year} + '년 | ' + ${car.mileage} + 'km | ' + ${car.saleLocation}">정보</div>
                        <div class="encar-tag">
                            <span class="tag" th:if="${car.ownershipStatus == '소유중'}">무사고</span>
                            <span class="tag">1인소유</span>
                        </div>
                    </td>
                    <td class="encar-price"
                        th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'">가격</td>
                </tr>
                </tbody>
            </table>

            <!-- 일반등록 영역 -->
            <div class="section-title">일반등록</div>
            <table class="premium-table">
                <thead>
                <tr>
                    <th>사진</th>
                    <th>차량정보</th>
                    <th>가격</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="car : ${carList}">
                    <td><img class="thumb" th:src="@{'/img/' + ${car.carName} + '.jpg'}" th:alt="${car.carName}"></td>
                    <td>
                        <div class="encar-title" th:text="${car.carName}">차량명</div>
                        <div class="encar-category"
                             th:text="${car.year} + '년 | ' + ${car.mileage} + 'km | ' + ${car.saleLocation}">정보</div>
                        <div class="encar-tag">
                            <span class="tag" th:if="${car.ownershipStatus == '소유중'}">무사고</span>
                            <span class="tag">1인소유</span>
                        </div>
                    </td>
                    <<td class="encar-price"
                         th:text="${#numbers.formatInteger(car.price / 10000, 1, 'COMMA')} + '만원'">가격</td>
                </tr>
                </tbody>
            </table>
        </main>

        <!-- 📦 우측 배너 영역 -->
        <aside class="sidebar-right">
            <div class="widget">이차어때? 모카</div>
        </aside>
    </div>
</div>
<div class="footer">
    ⓒ 2025 N카. All rights reserved.
</div>

</body>
</html>

<script>
    document.addEventListener("DOMContentLoaded", function () {
    const path = window.location.pathname;
    const links = document.querySelectorAll('.menu-left a, .menu-right a');
    links.forEach(link => {
    if (link.getAttribute('data-path') === path) {
    link.classList.add('active');
    }
    });
    });
</script>
