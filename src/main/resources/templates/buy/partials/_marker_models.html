<div th:fragment="models" xmlns:th="http://www.thymeleaf.org">
    <div class="maker-chip" style="display:flex;align-items:center;gap:8px;margin:6px 0 8px;">
        <strong th:text="${facet.maker}">현대</strong>
        <button type="button" class="btn-clear-maker"
                style="margin-left:auto;border:0;background:transparent;cursor:pointer;font-size:16px;"
                aria-label="제조사 선택 해제">✕</button>
    </div>

    <div class="subsection" style="font-size:12px;color:#9aa1a7;margin:8px 0 4px;">인기모델</div>
    <ul class="filter-list with-count">
        <li th:each="m : ${facet.popularModels}">
            <label>
                <input type="checkbox" name="modelNames" th:value="${m.label}">
                <span th:text="${m.label}">그랜저</span>
            </label>
            <span class="count" th:text="${#numbers.formatInteger(m.count,1,'COMMA')}">0</span>
        </li>
    </ul>

    <div class="subsection" style="font-size:12px;color:#9aa1a7;margin:10px 0 4px;border-top:1px solid #f1f3f5;padding-top:8px;">이름순</div>
    <ul class="filter-list with-count">
        <li th:each="n : ${facet.alphaCarNames}">
            <label>
                <input type="checkbox" name="carNames" th:value="${n.label}">
                <span th:text="${n.label}">i30</span>
            </label>
            <span class="count" th:text="${#numbers.formatInteger(n.count,1,'COMMA')}">0</span>
        </li>
    </ul>
</div>
